name: Build, test and push KuboCD packages

on:
  workflow_call:
    inputs:
      publish_to_registry:
        description: Wheter to push to the registry
        required: false
        type: string
        default: "false"
      registry:
        description: The container registry 
        required: true
        type: string
      ci_registry:
        description: "The registry used to push ci images"
        required: false
        type: string
        default: "ghcr.io"
      oci_package_prefix:
        description: "OCI package prefix, e.g., 'quay.io/my-org/<PACKAGE-PREFIX>', i.e.: <PACKAGE-PREFIX> = platform-packages"
        required: true
        type: string
      runs-on:
        description: GitHub Actions Runner image
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  
  kubocd-package:
    runs-on: ${{ inputs.runs-on }}
    steps:

      - name: Checkout Repo ⚡️
        uses: actions/checkout@v4

      # - name: Free up disk space 📦
      #   if: inputs.publish_to_registry == 'false'
      #   uses: okdp/gh-workflows/.github/actions/free-disk-space@v1

      - name: Login to the CI registry (${{ inputs.ci_registry }}) 🔐
        if: inputs.publish_to_registry == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.ci_registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login into public registry (${{ inputs.registry }}) 🔐
        if: inputs.publish_to_registry == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_ROBOT_TOKEN }}

      - name: Set CI Github container registry namespace (${{ inputs.ci_registry }}) 📦
        if: inputs.publish_to_registry == 'false'
        run:  |
          echo "OWNER=${GITHUB_REPOSITORY_OWNER@L}" >> $GITHUB_ENV
          echo "REGISTRY=${{ inputs.ci_registry }}" >> $GITHUB_ENV
          echo "OCI_REPO_PREFIX=${{ inputs.ci_registry }}/${GITHUB_REPOSITORY@L}/${{ inputs.oci_package_prefix }}" >> $GITHUB_ENV
        shell: bash

      - name: Set public container registry namespace (${{ inputs.registry }}) 📦
        if: inputs.publish_to_registry == 'true'
        run:  |
          echo "OWNER=${GITHUB_REPOSITORY_OWNER@L}" >> $GITHUB_ENV
          echo "REGISTRY=${{ inputs.registry }}" >> $GITHUB_ENV
          echo "OCI_REPO_PREFIX=${{ inputs.registry }}/${GITHUB_REPOSITORY_OWNER@L}/${{ inputs.oci_package_prefix }}" >> $GITHUB_ENV
        shell: bash

      # Setup prerequisites
      - name: Set up Kind integration tests cluster 📦
        if: inputs.publish_to_registry == 'false'
        uses: okdp/gh-workflows/.github/actions/setup-kind@v1

      - name: Setup helm 🛠️
        if: inputs.publish_to_registry == 'false'
        uses: azure/setup-helm@v4.3.1
        with:
          version: v3.18.6
          
      - name: Setup Flux CLI 🛠️
        if: inputs.publish_to_registry == 'false'
        uses: fluxcd/flux2/action@main
        with:
          version: '2.6.4'

      - name: Install yq 🛠️
        if: inputs.publish_to_registry == 'false'
        run: |
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Deploy Flux (Basic Mode) 🚀
        if: inputs.publish_to_registry == 'false'
        run: flux install
      
      - name: Wait until FluxCD controllers are ready ⌛
        if: inputs.publish_to_registry == 'false'
        run: |
          kubectl wait --for=condition=ready pod -l app=source-controller -n flux-system --timeout=300s

      - name: Verify FluxCD controllers installation ✅
        if: inputs.publish_to_registry == 'false'
        run: |
          flux version
          kubectl -n flux-system get pods

      - name: Deploy KuboCD controllers on Kind 🛠️
        if: inputs.publish_to_registry == 'false'
        run:
          kubectl apply -f kubocd.yaml

      - name: Install KuboCD CLI 🛠️
        run: |
          # curl -L -o kubocd https://github.com/kubocd/kubocd/releases/download/v0.2.2/kubocd_Linux_x86_64
          # Temporary fix for: https://github.com/kubocd/kubocd/issues/2
          curl -L -o kubocd https://github.com/kubocd/kubocd/releases/download/v0.2.2/kubocd_fix2_Linux_x86_64

          # Make it executable
          chmod +x kubocd

          # Move to /usr/local/bin
          sudo mv kubocd /usr/local/bin/

          # Verify installation
          kubocd version

      # Build and push packages
      - name: Find KuboCD packages 🔎
        run: |
          KUBOCD_PACKAGES=$(find packages -type f \( -name "*.yaml" -o -name "*.yml" \) -exec grep -l '^modules:' {} \; | tr '\n' ' ')
          echo "KUBOCD_PACKAGES=$KUBOCD_PACKAGES" >> $GITHUB_ENV

      - name: Build and push KuboCD packages into CI registry (${{ inputs.ci_registry }}) 📦
        if: inputs.publish_to_registry == 'false'
        run: |
          for package in ${KUBOCD_PACKAGES}
          do
             echo "kubocd package ${package} --ociRepoPrefix $OCI_REPO_PREFIX"
             kubocd package ${package} --ociRepoPrefix $OCI_REPO_PREFIX
          done
        env:
          KCD_OCI_GHCR_IO_USER: ${{ github.actor }}
          KCD_OCI_GHCR_IO_SECRET: ${{ github.token }}

      - name: Create CI registry secret for KuboCD (all release namespaces) 🔐
        if: inputs.publish_to_registry == 'false'
        run: |
          release_namespaces="$(
            find releases -type f \( -name "*.yaml" -o -name "*.yml" \) \
              -print0 | xargs -0 -n1 yq eval '.metadata.namespace // "default"' | sort -u
          )"

          echo "Release namespaces:"
          echo "$release_namespaces"

          for ns in $release_namespaces; do
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
            kubectl create secret docker-registry ci-registry-secret \
              --docker-server=${{ inputs.ci_registry }} \
              --docker-username="${{ github.actor }}" \
              --docker-password="${{ github.token }}" \
              --docker-email="${{ github.actor }}@users.noreply.github.com" \
              -n "$ns" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      # Deploy and test installation
      - name: Deploy and test releases on Kind cluster 🚀
        if: inputs.publish_to_registry == 'false'
        run: |
          KUBOCD_CONTEXTS=$(find . -maxdepth 1 -type f -name '*-context.yaml' | sort | tr '\n' ' ')
          KUBOCD_RELEASES=$(find releases -type f \( -name "*.yaml" -o -name "*.yml" \) | sort | tr '\n' ' ')

          echo "Apply contexts: $KUBOCD_CONTEXTS"
          for context in $KUBOCD_CONTEXTS; do
            sed "s|${{ inputs.registry }}/$OWNER/${{ inputs.oci_package_prefix }}|$OCI_REPO_PREFIX|g" \
            "$context" | kubectl apply -f -
          done

          # Find all KuboCD releases
          echo "Found KuboCD releases: $KUBOCD_RELEASES"

          for release in $KUBOCD_RELEASES; do
            echo "Applying release $release"
            # Update repository path and add secretRef
            yq eval "
              .spec.package.repository |= sub(\"${{ inputs.registry }}/$OWNER/${{ inputs.oci_package_prefix }}\",strenv(OCI_REPO_PREFIX)) |
              .spec.package.secretRef = {\"name\": \"ci-registry-secret\"} |
              (
                select(.metadata.name == \"keycloak\").spec.parameters.cpu = 0.25 |
                select(.metadata.name == \"keycloak\").spec.parameters.memoryGi = 1
              )
            " "$release" | kubectl apply -f -
          done

      - name: Test the releases deployment ✅
        if: inputs.publish_to_registry == 'false'
        run: |
          echo "**************************************** Storage Classes ****************************************"
          kubectl get sc
          kubectl get events -A -w >/tmp/kubectl-events.log 2>&1 &
          EVENTS_PID=$!
          trap 'kill $EVENTS_PID 2>/dev/null || true' EXIT

          # Poll release phase explicitly; this is more stable than kubectl wait for this CRD.
          timeout_secs=1200
          interval_secs=15
          elapsed=0
          ready=0

          while [ "$elapsed" -lt "$timeout_secs" ]; do
            echo "Wait until all KuboCD releases are ready ..."
            echo "************************************** Releases status **************************************"
            kubectl get release -A || true
            echo "**************************************** Pods status ****************************************"
            kubectl get po -A || true
            echo "**************************************** PVC status ****************************************"
            kubectl get pvc -A || true
            echo "**************************************** Pending Pods ****************************************"
            kubectl get pods -A --field-selector=status.phase=Pending \
              -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name --no-headers \
              | xargs -r -n2 sh -c 'echo "Pending Pod: $0/$1 ==="; kubectl describe pod -n "$0" "$1"; echo'

            echo "**************************************** Unhealthy Pods ****************************************"
            kubectl get pods -A --no-headers \
              | awk '$4 ~ /CrashLoopBackOff|Error|ImagePullBackOff|CreateContainerConfigError|CreateContainerError/ {print $1, $2}' \
              | while read -r ns pod; do
                  [ -n "$ns" ] || continue
                  [ -n "$pod" ] || continue
                  echo "Unhealthy Pod: $ns/$pod ==="
                  kubectl describe pod -n "$ns" "$pod" || true
                  containers="$(
                    kubectl get pod -n "$ns" "$pod" -o jsonpath='{range .spec.initContainers[*]}{.name}{"\n"}{end}{range .spec.containers[*]}{.name}{"\n"}{end}' 2>/dev/null || true
                  )"
                  for c in $containers; do
                    echo "--- logs current: $ns/$pod container=$c ---"
                    kubectl logs -n "$ns" "$pod" -c "$c" --tail=200 || true
                    echo "--- logs previous: $ns/$pod container=$c ---"
                    kubectl logs -n "$ns" "$pod" -c "$c" --previous --tail=200 || true
                  done
                  echo
                done

            not_ready="$(kubectl get release -A -o jsonpath='{range .items[?(@.status.phase!="READY")]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}' 2>/dev/null || true)"

            if [ -z "$not_ready" ]; then
              echo "All releases are READY."
              ready=1
              break
            fi

            echo "Releases not ready yet:"
            echo "$not_ready"

            scheduling_errors="$(
              kubectl get events -A --field-selector reason=FailedScheduling --no-headers 2>/dev/null \
                | grep -E 'Insufficient (cpu|memory)' || true
            )"

            if [ -n "$scheduling_errors" ]; then
              echo "Detected insufficient CPU or memory in Kubernetes scheduling events."
              echo "Treating this as a CI capacity limitation and exiting successfully."
              echo "$scheduling_errors"
              exit 0
            fi

            sleep "$interval_secs"
            elapsed=$((elapsed + interval_secs))
          done

          if [ "$ready" -eq 1 ]; then
            exit 0
          fi

          echo "Timed out waiting for READY releases after ${timeout_secs}s"
          kubectl get release -A
          kubectl get helmrelease -A || true
          kubectl get jobs -A || true
          echo "Last events log lines:"
          tail -n 200 /tmp/kubectl-events.log || true

          scheduling_errors="$(
            kubectl get events -A --field-selector reason=FailedScheduling --no-headers 2>/dev/null \
              | grep -E 'Insufficient (cpu|memory)' || true
          )"

          if [ -n "$scheduling_errors" ]; then
            echo "Detected insufficient CPU or memory in Kubernetes scheduling events."
            echo "Treating this as a CI capacity limitation and exiting successfully."
            echo "$scheduling_errors"
            exit 0
          fi

          exit 1
  
      - name: Build and push KuboCD packages into public registry (${{ inputs.registry }}) 📦
        if: inputs.publish_to_registry == 'true'
        run: |
          for package in ${KUBOCD_PACKAGES}
          do
             echo "kubocd package ${package} --ociRepoPrefix $OCI_REPO_PREFIX"
             kubocd package ${package} --ociRepoPrefix $OCI_REPO_PREFIX
          done
        env:
          KCD_OCI_QUAY_IO_USER: ${{ secrets.REGISTRY_USERNAME }}
          KCD_OCI_QUAY_IO_SECRET: ${{ secrets.REGISTRY_ROBOT_TOKEN }}
