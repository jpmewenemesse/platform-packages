apiVersion: v1alpha1
name: airflow
tag: 3.2.1-p1
protected: false
description: |
  Apache Airflow 2.9.3 - Workflow orchestration platform with Spark Operator integration

usage:
  text: |
    Apache Airflow release has been applied successfully.
    Pods, ingress, and certificate provisioning may still take a few minutes.

    Access the Airflow UI:
      URL: {{ .Context.airflow.endpoint.url | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace | replace "{{ .Release.metadata.name }}" .Release.metadata.name | replace "{{ .Context.ingress.suffix }}" .Context.platform.ingress.suffix }}
      Authenticate via the configured OIDC provider.

schema:
  context:
    properties:
      platform:
        required: true
        properties:
          certificateIssuers:
            required: true
            properties:
              selfSigned:
                properties:
                  name: { type: string, required: true }
          ingress:
            required: true
            properties:
              suffix: { type: string, required: true }

modules:
  - name: main
    timeout: 15m
    source:
      helmRepository:
        url: https://airflow.apache.org
        chart: airflow
        version: 1.21.0
    values: |
      executor: KubernetesExecutor
      
      defaultAirflowTag: "3.2.1"
      airflowVersion: "3.2.1"
      
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      {{- $airflowUrl := .Context.airflow.endpoint.url
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $airflowHost := regexReplaceAll "^https?://" $airflowUrl "" -}}
      {{- $airflowGitSync := .Context.airflow.dags.gitSync | default dict }}
      {{- $airflowGitSyncValues := omit $airflowGitSync "credentialsSecret" }}
      {{- $airflowOidc := .Context.airflow.oidc | default dict }}
      {{- $airflowOidcEnabled := $airflowOidc.enabled | default false }}
      {{- $airflowOidcRoleMapping := $airflowOidc.roleMapping | default dict }}
      {{- $airflowOidcBaseUrl := "" }}
      {{- $airflowOidcAuthUrl := "" }}
      {{- $airflowOidcTokenUrl := "" }}
      {{- $airflowOidcIssuerUri := "" }}
      {{- if $airflowOidcEnabled }}
        {{- $oidcId := required "context.airflow.oidc.provider is required when Airflow OIDC is enabled" $airflowOidc.provider -}}
        {{- $oidcProvider := (index .Context $oidcId).provider -}}
        {{- $airflowOidcBaseUrl = (required "context airflow OIDC provider baseUri is required" $oidcProvider.baseUri)
              | replace "{{ .Release.namespace }}" $namespace
              | replace "{{ .Release.metadata.name }}" $release
              | replace "{{ .Context.ingress.suffix }}" $domain -}}
        {{- $airflowOidcAuthUrl = (required "context airflow OIDC provider authUrl is required" $oidcProvider.endpoints.authUrl)
              | replace "{{ .Release.namespace }}" $namespace
              | replace "{{ .Release.metadata.name }}" $release
              | replace "{{ .Context.ingress.suffix }}" $domain -}}
        {{- $airflowOidcTokenUrl = (required "context airflow OIDC provider tokenUrl is required" $oidcProvider.endpoints.tokenUrl)
              | replace "{{ .Release.namespace }}" $namespace
              | replace "{{ .Release.metadata.name }}" $release
              | replace "{{ .Context.ingress.suffix }}" $domain -}}
        {{- $airflowOidcIssuerUri = (required "context airflow OIDC provider issuerUri is required" $oidcProvider.issuerUri)
              | replace "{{ .Release.namespace }}" $namespace
              | replace "{{ .Release.metadata.name }}" $release
              | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- end }}

      extraEnv: |
      {{- if $airflowOidcEnabled }}
        - name: AIRFLOW_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ $airflowOidc.credentialsSecret.name }}
              key: {{ $airflowOidc.credentialsSecret.clientIdKey }}
        - name: AIRFLOW_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ $airflowOidc.credentialsSecret.name }}
              key: {{ $airflowOidc.credentialsSecret.clientSecretKey }}
        - name: AIRFLOW_OIDC_API_BASE_URL
          value: {{ $airflowOidcBaseUrl | quote }}
        - name: AIRFLOW_OIDC_ACCESS_TOKEN_URL
          value: {{ $airflowOidcTokenUrl | quote }}
        - name: AIRFLOW_OIDC_AUTHORIZE_URL
          value: {{ $airflowOidcAuthUrl | quote }}
        - name: AIRFLOW_OIDC_SERVER_METADATA_URL
          value: {{ printf "%s/.well-known/openid-configuration" $airflowOidcIssuerUri | quote }}
        - name: AIRFLOW_OIDC_SCOPE
          value: {{ $airflowOidc.scope | quote }}
      {{- end }}
        - name: INSECURE_VERIFY_TLS
          value: {{ if ($airflowOidc.insecureSkipVerify | default false) }}"false"{{ else }}"true"{{ end }}
        - name: REQUESTS_CA_BUNDLE
          value: "/cacerts/ca.crt"
        - name: SSL_CERT_FILE
          value: "/cacerts/ca.crt"
        - name: CURL_CA_BUNDLE
          value: "/cacerts/ca.crt"

      apiServer:
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
        startupProbe:
          failureThreshold: 24
          timeoutSeconds: 30
        {{- if $airflowOidcEnabled }}
        apiServerConfig: |
          import os

          from flask_appbuilder.security.manager import AUTH_OAUTH
      
          verify_tls = os.environ.get("INSECURE_VERIFY_TLS", "true").lower() == "true"
          oauth_verify = os.environ.get("REQUESTS_CA_BUNDLE") if verify_tls else False

          AUTH_TYPE = AUTH_OAUTH
          AUTH_USER_REGISTRATION = True
          AUTH_USER_REGISTRATION_ROLE = "Viewer"
          # Sync Airflow roles from OIDC groups at every login
          AUTH_ROLES_SYNC_AT_LOGIN = True
          # Map OIDC groups to Airflow roles
          AUTH_ROLES_MAPPING = {
          {{- range $oidcRole, $airflowRoles := $airflowOidcRoleMapping }}
              {{ $oidcRole | quote }}: {{ $airflowRoles | toJson }},
          {{- end }}
          }

          OAUTH_PROVIDERS = [
              {
                  "name": "oidc",
                  "icon": "fa-circle-o",
                  "token_key": "access_token",
                  "remote_app": {
                      "client_id": os.environ["AIRFLOW_OIDC_CLIENT_ID"],
                      "client_secret": os.environ["AIRFLOW_OIDC_CLIENT_SECRET"],
                      "api_base_url": os.environ["AIRFLOW_OIDC_API_BASE_URL"],
                      "access_token_url": os.environ["AIRFLOW_OIDC_ACCESS_TOKEN_URL"],
                      "authorize_url": os.environ["AIRFLOW_OIDC_AUTHORIZE_URL"],
                      "server_metadata_url": os.environ["AIRFLOW_OIDC_SERVER_METADATA_URL"],
                      "client_kwargs": {
                          "scope": os.environ.get("AIRFLOW_OIDC_SCOPE", "openid profile email").replace("+", " "),
                          oauth_verify: oauth_verify,
                      },
                  },
              },
          ]
        {{- end }}
        
        extraVolumes:
          - name: cacerts
            secret:
              secretName: certs-bundle
      
        extraVolumeMounts:
          - name: cacerts
            mountPath: /cacerts

      scheduler:
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
        startupProbe:
          failureThreshold: 12
          timeoutSeconds: 60

      triggerer:
        enabled: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "300m"

      ingress:
        apiServer:
          enabled: true
          ingressClassName: nginx
          annotations:
            kubernetes.io/ingress.class: nginx
            cert-manager.io/cluster-issuer: {{ .Context.platform.certificateIssuers.selfSigned.name }}
            nginx.ingress.kubernetes.io/proxy-body-size: "0"

          hosts:
            - name: {{ $airflowHost }}
              tls:
                enabled: true
                secretName: airflow-tls

      # Point to the pre-provisioned secret (via local-secrets-provider) that holds the
      # full SQLAlchemy connection string. The chart skips generating its own airflow-metadata
      # secret, so credentials never appear in the package values.
      data:
        metadataSecretName: {{ .Context.airflow.database.credentialsSecret.name }}

      dags:
        mountPath: /opt/airflow/dags
        persistence:
            enabled: false
        gitSync:
          {{- toYaml $airflowGitSyncValues | nindent 10 }}
          {{- with $airflowGitSync.credentialsSecret }}
          credentialsSecret: {{ required "context.airflow.dags.gitSync.credentialsSecret.name is required" .name | quote }}
          {{- end }}
          {{- if or .Context.platform.proxy.httpProxy .Context.platform.proxy.httpsProxy .Context.platform.proxy.noProxy }}
          env:
            {{- if .Context.platform.proxy.httpProxy }}
            - name: HTTP_PROXY
              value: {{ .Context.platform.proxy.httpProxy | quote }}
            {{- end }}
            {{- if .Context.platform.proxy.httpsProxy }}
            - name: HTTPS_PROXY
              value: {{ .Context.platform.proxy.httpsProxy | quote }}
            {{- end }}
            {{- if .Context.platform.proxy.noProxy }}
            - name: NO_PROXY
              value: {{ .Context.platform.proxy.noProxy | quote }}
            {{- end }}
          {{- end }}
      
      dagProcessor:
        enabled: true
      flower:
        enabled: false
      pgbouncer:
        enabled: false
      statsd:
        enabled: false
      redis:
        enabled: false
      workers:
        replicas: 0
      postgresql:
        enabled: false
      webserver:
        enabled: false
      createUserJob:
        enabled: false
        useHelmHooks: false
        #defaultUser:
        #  enabled: true
        #  role: Admin
        #  username: admin
        #  email: admin@example.com
        #  firstName: admin
        #  lastName: user
        #  password: admin
        #resources:
        #  requests:
        #    memory: "64Mi"
        #   cpu: "25m"
        #  limits:
        #   memory: "256Mi"
        #   cpu: "200m"
      
      migrateDatabaseJob:
        enabled: true
        useHelmHooks: false
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "256Mi"
            cpu: "200m"

      config:
        core:
          load_examples: 'False'
          auth_manager: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
        fab:
          enable_proxy_fix: "True"
          cookie_secure: "True"
          cookie_samesite: "Lax"
      
      apiSecretKeySecretName: {{ .Context.airflow.advanced.config.security.credentialsSecret.name }}
      jwtSecretName: {{ .Context.airflow.advanced.config.security.credentialsSecret.name }}
      fernetKeySecretName: {{ .Context.airflow.advanced.config.security.credentialsSecret.name }}

roles:
  - airflow

dependencies:
  - external-secrets
  - database-server
  - ingress
