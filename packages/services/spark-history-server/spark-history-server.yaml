apiVersion: v1alpha1
name: spark-history-server
tag: 3.5.1-p04
protected: false
description: |
  Spark History Server - Monitoring and debugging interface for Apache Spark applications.
  Provides detailed execution metrics, job timelines, and performance insights for completed Spark jobs.
  Essential tool for optimizing Spark workloads and troubleshooting data processing pipelines.
usage:
  text: |
    Spark History Server provides a web UI for viewing completed Spark applications.
    {{- if .Parameters.enableWebProxy }}
    {{- $historyEndpointUrl := .Context.sparkHistory.endpoints.url
    | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace
    | replace "{{ .Release.metadata.name }}" .Release.metadata.name
    | replace "{{ .Context.ingress.suffix }}" .Context.platform.ingress.suffix
    -}}
    {{- $historyEndpointScheme := regexFind "^https?://" $historyEndpointUrl | default "https://" -}}
    Access the UI at {{- printf "%s%s-%s.%s" $historyEndpointScheme .Parameters.webProxyUrlPrefix .Release.spec.targetNamespace .Context.platform.ingress.suffix -}}
    {{- else }}
    Access the UI at {{ .Context.sparkHistory.endpoints.url | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace | replace "{{ .Release.metadata.name }}" .Release.metadata.name | replace "{{ .Context.ingress.suffix }}" .Context.platform.ingress.suffix }}
    {{- end }}
schema:
  parameters:
    properties:
      enableWebProxy: { type: boolean, default: true, description: "Whether to enable Spark History web proxy" }
      webProxyUrlPrefix: { type: string, default: "spark-web-proxy", description: "Spark web proxy url prefix" }
  context:
    properties:
      platform:
        required: true
        properties:
          certificateIssuers:
            required: true
            properties:
              selfSigned:
                properties:
                  name: { type: string, required: true }
          ingress:
            required: true
            properties:
              suffix: { type: string, required: true }
modules:
  - name: main
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/spark-history-server
        tag: 1.0.0
    values: |
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $oidcId := .Context.sparkHistory.oidc.provider -}}
      {{- $oidcProvider := (index .Context $oidcId).provider -}}
      {{- $oidcRoleMapping := .Context.sparkHistory.oidc.roleMapping | default dict -}}
      {{- if not (kindIs "map" $oidcRoleMapping) }}
        {{- fail "context.sparkHistory.oidc.roleMapping must be a map" -}}
      {{- end }}
      {{- $adminGroups := get $oidcRoleMapping "admin_groups" | default list -}}
      {{- $historyAdminGroups := get $oidcRoleMapping "history_admin_groups" | default list -}}
      {{- $modifyGroups := get $oidcRoleMapping "modify_groups" | default list -}}
      {{- $viewGroups := get $oidcRoleMapping "view_groups" | default list -}}
      
      {{- $oidcIssuerUri := $oidcProvider.issuerUri
      | replace "{{ .Release.namespace }}" $namespace
      | replace "{{ .Release.metadata.name }}" $release
      | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $storageId := .Context.sparkHistory.storage.provider -}}
      {{- $storageProvider := (index .Context $storageId).provider -}}
      
      {{- $storageApiUrl := $storageProvider.endpoints.apiUrl
          | replace "{{ .Release.namespace }}" $namespace
          | replace "{{ .Release.metadata.name }}" $release
          | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $hiveMetastoreUrl := .Context.hiveMetastore.endpoints.url
          | replace "{{ .Release.namespace }}" $namespace
          | replace "{{ .Release.metadata.name }}" $release
          | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $historyEndpoint := .Context.sparkHistory.endpoints.url 
          | replace "{{ .Release.namespace }}" $namespace
          | replace "{{ .Release.metadata.name }}" $release -}}
      {{- $historyEndpointUrl := $historyEndpoint | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $historyEndpointHost := regexReplaceAll "^https?://" $historyEndpointUrl "" -}}
      
      {{- $historyEndpointScheme := regexFind "^https?://" $historyEndpointUrl | default "https://" -}}
      {{- $webProxyEndpointUrl := printf "%s%s-%s.%s" $historyEndpointScheme .Parameters.webProxyUrlPrefix $namespace $domain -}}
      
      {{- $historyRedirectUri := $historyEndpointUrl -}}
      
      {{- if .Parameters.enableWebProxy }}
      {{- $historyRedirectUri := $webProxyEndpointUrl -}}
      {{- end }}
      {{- $sparkHistoryExtraConfig := (.Context.sparkHistory.config | default dict) -}}
      {{- if not (kindIs "map" $sparkHistoryExtraConfig) }}
        {{- fail "context.sparkHistory.config must be a map" -}}
      {{- end }}
      
      image:
        repository: quay.io/okdp/spark
        pullPolicy: IfNotPresent
        tag: "spark-3.5.6-scala-2.12-java-17"
      
      ingress:
        enabled: true
        ingressClassName: "nginx"
        annotations:
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          cert-manager.io/cluster-issuer: {{ .Context.platform.certificateIssuers.selfSigned.name }}
        hosts:
          - host: {{ $historyEndpointHost }}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - {{ $historyEndpointHost }}
            secretName: {{ .Release.metadata.name }}-tls
      
      config:
        spark.hadoop.fs.s3a.endpoint: {{ $storageApiUrl }}
        spark.io.okdp.spark.authc.OidcAuthFilter.param.issuer-uri: {{ $oidcIssuerUri }}
        spark.io.okdp.spark.authc.OidcAuthFilter.param.redirect-uri: {{ $historyRedirectUri }}/home
        spark.io.okdp.spark.authc.OidcAuthFilter.param.scope: {{ .Context.sparkHistory.oidc.scope }}
        spark.io.okdp.spark.authc.OidcAuthFilter.param.cookie-max-age-minutes: 480
        spark.io.okdp.spark.authc.OidcAuthFilter.param.cookie-cipher-secret-key: FC5E81345CED0E256DC42E410362FF6E
        spark.io.okdp.spark.authc.OidcAuthFilter.param.cookie-is-secure: true
        spark.io.okdp.spark.authc.OidcAuthFilter.param.use-pkce: {{ .Context.sparkHistory.oidc.usePKCE }}
      {{- if gt (len $adminGroups) 0 }}
        # spark.admin.acls.groups
        spark.admin.acls.groups: {{ $adminGroups | join "," | quote }}
      {{- end }}
      {{- if gt (len $historyAdminGroups) 0 }}
        # spark.history.ui.admin.acls.groups
        spark.history.ui.admin.acls.groups: {{ $historyAdminGroups | join "," | quote }}
      {{- end }}
      {{- if gt (len $modifyGroups) 0 }}
        # spark.modify.acls.groups
        spark.modify.acls.groups: {{ $modifyGroups | join "," | quote }}
      {{- end }}
      {{- if gt (len $viewGroups) 0 }}
        # spark.ui.view.acls.groups
        spark.ui.view.acls.groups: {{ $viewGroups | join "," | quote }}
      {{- end }}
      {{- range $key := (keys $sparkHistoryExtraConfig | sortAlpha) }}
        {{ $key }}: {{ index $sparkHistoryExtraConfig $key }}
      {{- end }}
      extraEnvs:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Context.sparkHistory.storage.credentialsSecret.name }}
              key: {{ .Context.sparkHistory.storage.credentialsSecret.accessKeyKey }}
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Context.sparkHistory.storage.credentialsSecret.name }}
              key: {{ .Context.sparkHistory.storage.credentialsSecret.secretKeyKey }}
        # Disable Certificate Checking
        - name: SPARK_HISTORY_OPTS
          value: "-Dcom.amazonaws.sdk.disableCertChecking=true"
        - name: JAVA_TOOL_OPTIONS
          value: "-Djavax.net.ssl.trustStore=/cacerts/bundle.p12 -Djavax.net.ssl.trustStorePassword="
        - name: AUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Context.sparkHistory.oidc.credentialsSecret.name }}
              key: {{ .Context.sparkHistory.oidc.credentialsSecret.clientIdKey }}
        - name: AUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Context.sparkHistory.oidc.credentialsSecret.name }}
              key: {{ .Context.sparkHistory.oidc.credentialsSecret.clientSecretKey }}      
      
      extraVolumes:
        - name: cacerts
          secret:
            secretName: certs-bundle
      
      extraVolumeMounts:
        - name: cacerts
          mountPath: /cacerts
  # TODO: Kubocd — Add conditional modules
  - name: proxy
    dependsOn:
      - main
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/spark-web-proxy
        tag: 0.1.0
    values: |

      {{- $webProxyEndpointHost := printf "%s-%s.%s" .Parameters.webProxyUrlPrefix .Release.spec.targetNamespace .Context.platform.ingress.suffix -}}
      
      image:
        repository: quay.io/okdp/spark-web-proxy
        pullPolicy: IfNotPresent
        tag: "0.2.1"
      
      configuration:
        spark:
          history:
            service: {{ .Release.metadata.name }}-main.{{ .Release.spec.targetNamespace }}.svc.cluster.local
          ui:
            proxyBase: /sparkui
          jobNamespaces:
            - {{ .Release.spec.targetNamespace }}
      
      ingress:
        enabled: true
        className: "nginx"
        annotations:
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          cert-manager.io/cluster-issuer: {{ .Context.platform.certificateIssuers.selfSigned.name }}
        hosts:
          - host: {{ $webProxyEndpointHost }}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - {{ $webProxyEndpointHost }}
            secretName: {{ .Release.metadata.name }}-proxy-tls
roles:
  - spark
dependencies:
  - identity
  - storage
  - ingress
