apiVersion: v1alpha1
name: polaris
tag: 1.3.0-incubating-p01
protected: false
description: |
  Apache Polaris is an open-source, fully-featured catalog for Apache Iceberg™.
usage:
  text: |
    Apache Polaris is an open-source, fully-featured catalog for Apache Iceberg™.
    Access the UI at {{ .Context.polarisConsole.endpoints.url | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace | replace "{{ .Release.metadata.name }}" .Release.metadata.name | replace "{{ .Context.ingress.suffix }}" .Context.platform.ingress.suffix }}
schema:
  parameters:
    properties:
      purge: { type: boolean, default: false, description: "Whether to purge realms and all associated entities." }
  context:
    properties:
      platform:
        required: true
        properties:
          certificateIssuers:
            required: true
            properties:
              selfSigned:
                properties:
                  name: { type: string, required: true }
          ingress:
            required: true
            properties:
              suffix: { type: string, required: true }
modules:
  - name: bootstrap
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/polaris-admin
        tag: 1.0.0
    values: |
      
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $databaseId := .Context.polaris.database.provider -}}
      {{- $databaseProvider := (index .Context $databaseId).provider -}}
      {{- $databaseHost := $databaseProvider.endpoints.host
        | replace "{{ .Release.namespace }}" $namespace
        | replace "{{ .Release.metadata.name }}" $release
        | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $databasePort := printf "%v" $databaseProvider.endpoints.port -}}   
      
      {{- $databaseJdbcUrl := $databaseProvider.endpoints.jdbcUrl 
        | replace "{{ connection.host }}" $databaseHost
        | replace "{{ connection.port }}" $databasePort
        | replace "{{ dbName }}" .Context.polaris.database.name -}}
      
      phase: "bootstrap"
      
      bootstrap:
  
        purge: {{ .Parameters.purge }}
      
        image:
          repository: apache/polaris-admin-tool
          tag: 1.3.0-incubating
          pullPolicy: IfNotPresent
  
        database:
          jdbcUrl: "{{ $databaseJdbcUrl }}"
          secret:
            name: {{ .Context.polaris.database.credentialsSecret.name }}
            usernameKey: {{ .Context.polaris.database.credentialsSecret.usernameKey }}
            passwordKey: {{ .Context.polaris.database.credentialsSecret.passwordKey }}
      
      realms:
        {{- toYaml .Context.polaris.realms | nindent 2 }}

  - name: main
    dependsOn:
      - bootstrap
    timeout: 10m
    source:
      helmRepository:
        url: https://downloads.apache.org/incubator/polaris/helm-chart/
        chart: polaris
        version: 1.3.0-incubating
    values: |
      
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $databaseId := .Context.polaris.database.provider -}}
      {{- $databaseProvider := (index .Context $databaseId).provider -}}
      {{- $databaseHost := $databaseProvider.endpoints.host
        | replace "{{ .Release.namespace }}" $namespace
        | replace "{{ .Release.metadata.name }}" $release
        | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $databasePort := printf "%v" $databaseProvider.endpoints.port -}}      
      
      {{- $databaseJdbcUrl := $databaseProvider.endpoints.jdbcUrl 
        | replace "{{ connection.host }}" $databaseHost
        | replace "{{ connection.port }}" $databasePort
        | replace "{{ dbName }}" .Context.polaris.database.name -}}
      
      {{- $oidcId := .Context.polaris.oidc.provider -}}
      {{- $oidcProvider := (index .Context $oidcId).provider -}}
      
      {{- $oidcIssuerUri := $oidcProvider.issuerUri
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $polarisEndpointAPI := .Context.polaris.endpoints.url 
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release -}}
      
      {{- $polarisEndpointAPIUrl := $polarisEndpointAPI | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $polarisEndpointAPIHost := regexReplaceAll "^https?://" $polarisEndpointAPIUrl "" -}}
      
      {{- $storageId := .Context.polaris.storage.provider -}}
      {{- $storageProvider := (index .Context $storageId).provider -}}
      
      {{- $storageApiUrl := $storageProvider.endpoints.apiUrl
          | replace "{{ .Release.namespace }}" $namespace
          | replace "{{ .Release.metadata.name }}" $release
          | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $storageRegion := $storageProvider.region -}}
      
      image:
        repository: apache/polaris
        pullPolicy: IfNotPresent
        tag: "1.3.0-incubating"
      
      extraEnv:
        # S3
        - name: AWS_REGION
          value: {{ $storageRegion }}
        - name: AWS_ENDPOINT_URL_S3
          value: {{ $storageApiUrl }}
        - name: AWS_ENDPOINT_URL_STS
          value: {{ $storageApiUrl }}
        # The Polaris SeaweedFS identity for STS
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Context.polaris.storage.credentialsSecret.name }}
              key: {{ .Context.polaris.storage.credentialsSecret.accessKeyKey }}
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Context.polaris.storage.credentialsSecret.name }}
              key: {{ .Context.polaris.storage.credentialsSecret.secretKeyKey }}
        # Polaris Database
        - name: QUARKUS_DATASOURCE_JDBC_URL
          value: {{ $databaseJdbcUrl }}
        - name: QUARKUS_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Context.polaris.database.credentialsSecret.name }}
              key: {{ .Context.polaris.database.credentialsSecret.usernameKey }}
        - name: QUARKUS_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Context.polaris.database.credentialsSecret.name }}
              key: {{ .Context.polaris.database.credentialsSecret.passwordKey }}
        - name: QUARKUS_OIDC_TLS_CONFIGURATION_NAME
          value: "oidc"
        - name: QUARKUS_TLS__OIDC__TRUST_STORE_PEM_CERTS
          value: "/cacerts/ca.crt"
        # OIDC, Enable multi-tenancy (Multiple realms)
        - name: QUARKUS_OIDC_TENANT-ENABLED
          value: "true"
        - name: QUARKUS_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Context.polaris.oidc.credentialsSecret.name }}
              key: {{ .Context.polaris.oidc.credentialsSecret.clientIdKey }}
        # Trust The CA
        - name: JAVA_TOOL_OPTIONS
          value: >-
            -Djavax.net.ssl.trustStore=/cacerts/bundle.p12
            -Djavax.net.ssl.trustStoreType=PKCS12
            -Djavax.net.ssl.trustStorePassword=

      persistence:
        type: relational-jdbc
      
      features:
        {{ toYaml .Context.polaris.features | nindent 2 }}
      
      realmContext:
        type: default
        realms:
        {{- range .Context.polaris.realms }}
          - {{ .name }}
        {{- end }}
      
      advancedConfig:
        {{ toYaml .Context.polaris.advanced.config | nindent 2 }}
      
      authentication:
        type: mixed
  
      oidc:
        authServeUrl: {{ $oidcIssuerUri }}
        client:
          id: ~
          secret:
            name: {{ .Context.polaris.oidc.credentialsSecret.name }}
            key: {{ .Context.polaris.oidc.credentialsSecret.clientSecretKey }}
        
        {{- $oidc := .Context.polaris.oidc }}
        principalMapper:
          {{ toYaml $oidc.principalMapper | nindent 4 }}
        # Mapped OIDC roles are visible, but they do not have the same effect as internal Polaris assignments.
        principalRolesMapper:
          {{ toYaml $oidc.principalRolesMapper | nindent 4 }}
      
      logging:
        level: DEBUG
      
      {{- $cors := toYaml .Context.polaris.advanced.cors -}}
      {{- $cors = $cors
            | replace "{{ .Context.ingress.suffix }}" .Context.platform.ingress.suffix
            | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace
      }}
      cors:{{ $cors | nindent 2 }}
      
      ingress:
        enabled: true
        className: "nginx"
        annotations:
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          cert-manager.io/cluster-issuer: {{ .Context.platform.certificateIssuers.selfSigned.name }}
        hosts:
          - host: {{ $polarisEndpointAPIHost }}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - {{ $polarisEndpointAPIHost }}
            secretName: {{ .Release.metadata.name }}-tls
            
      extraVolumes:
        - name: cacerts
          secret:
            secretName: certs-bundle
      
      extraVolumeMounts:
        - name: cacerts
          mountPath: /cacerts

  - name: principals
    dependsOn:
      - main
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/polaris-admin
        tag: 1.0.0
    values: |
      
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $polarisEndpointAPI := .Context.polaris.endpoints.url 
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release -}}
      
      {{- $polarisEndpointAPIUrl := $polarisEndpointAPI | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $polarisEndpointAPIHost := regexReplaceAll "^https?://" $polarisEndpointAPIUrl "" -}}
      
      phase: "principals"
      
      principals:
      
        image:
          repository: curlimages/curl
          tag: 8.18.0
          pullPolicy: IfNotPresent
      
        polaris:
          url: {{ $polarisEndpointAPIUrl }}
    
        caCertPath: /cacerts/ca.crt

      realms:
        {{- toYaml .Context.polaris.realms | nindent 2 }}

      extraVolumes:
        - name: cacerts
          secret:
            secretName: certs-bundle
      
      extraVolumeMounts:
        - name: cacerts
          mountPath: /cacerts

  - name: console
    dependsOn:
      - main
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/polaris-console
        tag: 0.1.0
    values: |

      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $oidcId := .Context.polarisConsole.oidc.provider -}}
      {{- $oidcProvider := (index .Context $oidcId).provider -}}
      
      {{- $oidcIssuerUri := $oidcProvider.issuerUri
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $polarisEndpointAPI := .Context.polarisConsole.apiUrl 
             | replace "{{ .Release.namespace }}" $namespace
             | replace "{{ .Release.metadata.name }}" $release -}}
      {{- $polarisEndpointAPIUrl := $polarisEndpointAPI | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $polarisEndpointConsole := .Context.polarisConsole.endpoints.url 
             | replace "{{ .Release.namespace }}" $namespace
             | replace "{{ .Release.metadata.name }}" $release -}}
      {{- $polarisEndpointConsoleUrl := $polarisEndpointConsole | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $polarisEndpointConsoleHost := regexReplaceAll "^https?://" $polarisEndpointConsoleUrl "" -}}
    
      image:
        repository: quay.io/okdp/polaris-console
        tag: 0.1.0-incubating
        pullPolicy: Always
        
      env:
        polarisApiUrl: "{{ $polarisEndpointAPIUrl }}"
        polarisRealm: "{{ .Context.polarisConsole.defaultRealm }}"
        oauthTokenUrl: "{{ $polarisEndpointAPIUrl }}/api/catalog/v1/oauth/tokens"
      
      extraEnv:
        VITE_OIDC_ISSUER_URL: "{{ $oidcIssuerUri }}"
        VITE_OIDC_CLIENT_ID: "{{ .Context.polarisConsole.oidc.clientId }}"
        VITE_OIDC_REDIRECT_URI: "{{ $polarisEndpointConsoleUrl }}/auth/callback"
        VITE_OIDC_SCOPE: "{{ .Context.polarisConsole.oidc.scope }}"

      ingress:
        enabled: true
        className: "nginx"
        annotations:
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          cert-manager.io/cluster-issuer: {{ .Context.platform.certificateIssuers.selfSigned.name }}
        hosts:
          - host: {{ $polarisEndpointConsoleHost }}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: polaris-console-tls
            hosts:
              - {{ $polarisEndpointConsoleHost }}

roles:
  - data-catalog
  - iceberg-catalog
dependencies:
  - identity
  - storage
  - database-server
  - ingress
