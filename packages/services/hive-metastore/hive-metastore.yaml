apiVersion: v1alpha1
name: hive-metastore
tag: 4.0.1-p01
protected: false
description: |
  Hive Metastore is a centralized metadata repository for data lakes and big data analytics.
  Stores and manages table schemas, partition information, and data locations for engines like Apache Hive, Spark, and Trino.
  Enables consistent schema access across distributed storage systems such as HDFS and Amazon S3, 
  providing the foundation for unified SQL-based querying over large-scale datasets.
usage:
  text: |
    Hive Metastore is a centralized metadata repository for data lakes and big data analytics.
schema:
  parameters:
    properties:
      memoryGi: { type: number, default: 0.5, multipleOf: 0.25, description: "Memory (GiB) used for Kubernetes requests/limits (recommended: request=limit)." }
      cpu: { type: number, default: 0.5, multipleOf: 0.25, description: "CPU request in millicores (e.g., 500=0.5 vCPU, 1000=1 vCPU)." }
modules:
  - name: main
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/hive-metastore
        tag: 1.4.0
    values: |
      
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $databaseId := .Context.hiveMetastore.database.provider -}}
      {{- $databaseProvider := (index .Context $databaseId).provider -}}
      
      {{- $databaseHost := $databaseProvider.endpoints.host
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $databasePort := printf "%v" $databaseProvider.endpoints.port -}}
      {{- $databaseType := $databaseProvider.type -}}
      {{- $databaseDriver := $databaseProvider.driver -}}
      
      {{- $storageId := .Context.hiveMetastore.storage.provider -}}
      {{- $storageProvider := (index .Context $storageId).provider -}}
      
      {{- $storageApiUrl := $storageProvider.endpoints.apiUrl
          | replace "{{ .Release.namespace }}" $namespace
          | replace "{{ .Release.metadata.name }}" $release
          | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $storageType := $storageProvider.type -}}
      
      {{- $endpoint := .Context.hiveMetastore.endpoints.url
        | replace "{{ .Release.namespace }}" $namespace }}
      {{- $noProto := $endpoint
          | trimPrefix "thrift://"
          | trimPrefix "thrift+ssl://" }}
      {{- $parts := $noProto | splitList ":" }}
      {{- $host := index $parts 0 }}
      {{- $port := index $parts 1 }}
      {{- $serviceName := ($host | splitList "." | first) }}

      replicaCount: 1
      image:
        repository: quay.io/okdp/hive-metastore
        tag: 4.0.1
        pullPolicy: IfNotPresent
      
      logLevel: INFO
      serviceName: {{ $serviceName }}
      
      db:
        driverRef: {{ $databaseDriver }}
        driverName: {{ $databaseType }}
        host: {{ $databaseHost }}
        port: {{ $databasePort }}
        databaseName: {{ .Context.hiveMetastore.database.name }}
        user:
          name: ~
          password:
            secretName: {{ .Context.hiveMetastore.database.credentialsSecret.name }}
            propertyName: {{ .Context.hiveMetastore.database.credentialsSecret.passwordKey }}
      
      extraEnvRaw:
      - name: HIVEMS_USER
        valueFrom:
          secretKeyRef:
            name: {{ .Context.hiveMetastore.database.credentialsSecret.name }}
            key: {{ .Context.hiveMetastore.database.credentialsSecret.usernameKey }}
      - name: THRIFT_LISTENING_PORT
        value: {{ $port | quote }}
      
      cloud_storage: "{{ $storageType }}"
      {{- if eq $storageType "s3" }}
      s3:
        url: {{ $storageApiUrl }}
        # Misleading issue on hive-metastore chart, warehouseDirectory is a bucket (prefix not available)
        warehouseDirectory: {{ trimPrefix "s3://" .Context.hiveMetastore.storage.location.uri }}
        accessKey:
          secretName: {{ .Context.hiveMetastore.storage.credentialsSecret.name }}
          propertyName: {{ .Context.hiveMetastore.storage.credentialsSecret.accessKeyKey }}
        secretKey:
          secretName: {{ .Context.hiveMetastore.storage.credentialsSecret.name }}
          propertyName: {{ .Context.hiveMetastore.storage.credentialsSecret.secretKeyKey }}
      gcs:
        enabled: false
      {{- end }}
      
      resources:
        requests:
          cpu: "{{ .Parameters.cpu }}"
          memory: "{{ .Parameters.memoryGi }}Gi"
        limits:
          cpu: "{{ mulf (float64 .Parameters.cpu) 2 }}"
          memory: "{{ mulf (float64 .Parameters.memoryGi) 2 }}Gi"
roles:
  - data-catalog
  - metastore-catalog
dependencies:
  - database-server
  - storage
