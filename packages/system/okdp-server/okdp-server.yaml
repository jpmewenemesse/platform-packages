apiVersion: v1alpha1
name: okdp-server
tag: 0.4.0-p01
protected: false
description: |
  OKDP Server - API backend for the Open Kubernetes Data Platform
usage:
  text: |
    OKDP Server provides the API backend for the OKDP platform.
    Access the API at https://okdp-server.{{ .Context.platform.ingress.suffix }}
    Swagger UI available at https://okdp-server.{{ .Context.platform.ingress.suffix }}/swagger
modules:
  - name: main
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/okdp-server
        tag: 0.5.0
    values: |
      
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $oidcId := .Context.platform.portal.oidc.provider -}}
      {{- $oidcProvider := (index .Context $oidcId).provider -}}
            
      {{- $oidcIssuerUri := $oidcProvider.issuerUri
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $oidcAuthUrl := $oidcProvider.endpoints.authUrl
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $oidcTokenUrl := $oidcProvider.endpoints.tokenUrl
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $oidcJwksUrl := $oidcProvider.endpoints.jwksUri
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}      
      
      extraEnvRaw:
        {{- if .Context.platform.proxy.httpProxy }}
        - name: HTTP_PROXY
          value: {{ .Context.platform.proxy.httpProxy | quote }}
        {{- end }}
        {{- if .Context.platform.proxy.httpsProxy }}
        - name: HTTPS_PROXY
          value: {{ .Context.platform.proxy.httpsProxy | quote }}
        {{- end }}
        {{- if .Context.platform.proxy.noProxy }}
        - name: NO_PROXY
          value: {{ .Context.platform.proxy.noProxy | quote }}
        {{- end }}
      configuration:
        clusters:
          {{- range .Context.platform.portal.clusters }}
          - id: {{ .id }}
            name: {{ .name | quote }}
            env: {{ .env }}
            auth:
              inCluster: {{ .auth.inCluster }}
          {{- end }}
        
        catalog:
          {{- range .Context.platform.portal.catalogs }}
          - id: {{ .id }}
            name: {{ .name | quote }}
            description: {{ .description | quote }}
            repoUrl: {{ $.Context.platform.portal.packageRepository }}
            packages:
              {{- range .packages }}
              - name: {{ .name }}
              {{- end }}
          {{- end }}

        server:
          listenAddress: 0.0.0.0
          port: 8090
          mode: debug

        logging:
          level: "debug"
          format: "console"

        security:
          authN:
            provider: ["bearer"]
            bearer:
              issuerUri: "{{ $oidcIssuerUri }}"
              jwksURL: "{{ $oidcJwksUrl }}"
              rolesAttributePath: "realm_access.roles"
              groupsAttributePath: "realm_access.groups"
              skipIssuerCheck: false
              skipSignatureCheck: true
          authZ:
            provider: "inline"
            inline:
              policy: |
                p, role:viewers, /api/v1/users/myprofile, *
                p, role:viewers, *, *

                g, role:platform_admin, role:developers
                g, role:developers, role:viewers
              model: |
                [request_definition]
                r = sub, obj, act

                [policy_definition]
                p = sub, obj, act

                [role_definition]
                g = _, _

                [policy_effect]
                e = some(where (p.eft == allow))

                [matchers]
                m = g(r.sub, p.sub) && keyMatch(r.obj, p.obj) && (r.act == p.act || p.act == "*")
          cors:
            allowedOrigins: ["*"]
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS", "HEAD"]
            allowedHeaders: ["Origin", "Accept", "Authorization", "Content-Length", "Content-Type"]
            exposedHeaders: ["Content-Length"]
            allowCredentials: true
            maxAge: 3600
          headers:
            X-Frame-Options: "DENY"
            X-Content-Type-Options: nosniff

        swagger:
          securitySchemes:
            oauth2:
              type: oauth2
              flows:
                authorizationCode:
                  authorizationUrl: "{{ $oidcAuthUrl }}"
                  tokenUrl: "{{ $oidcTokenUrl }}"
                  scopes:
                    openid: OpenId Authentication
                    email: User Email
                    profile: User Profile
                    roles: User Roles
          security:
            - oauth2: [openid, email, profile, roles]

      swagger-ui:
        enabled: true
        configuration:
          extraEnv:
            - name: BASE_URL
              value: /swagger
            - name: URLS
              value: |
                [{ url: 'https://okdp-server.{{ .Context.platform.ingress.suffix }}/api/v1/api-docs', name: 'OKDP Server' }]
            - name: OAUTH_CLIENT_ID
              value: okdp-server
            - name: OAUTH_SCOPES
              value: "openid profile email roles"
            - name: OAUTH_USE_PKCE
              value: "true"
            - name: CORS_ENABLED
              value: "true"
        ingress:
          enabled: true
          className: "nginx"
          annotations:
            cert-manager.io/cluster-issuer: "{{ .Context.platform.certificateIssuers.selfSigned.name }}"
          tls:
          - secretName: okdp-server-swagger-tls
            hosts:
            - okdp-server.{{ .Context.platform.ingress.suffix }}
          hosts:
            - host: okdp-server.{{ .Context.platform.ingress.suffix }}
              paths:
                - path: /swagger
                  pathType: Prefix

      ingress:
        enabled: true
        className: "nginx"
        annotations:
          cert-manager.io/cluster-issuer: "{{ .Context.platform.certificateIssuers.selfSigned.name }}"
        tls:
        - secretName: okdp-server-tls
          hosts:
          - okdp-server.{{ .Context.platform.ingress.suffix }}
        hosts:
          - host: okdp-server.{{ .Context.platform.ingress.suffix }}
            paths:
              - path: /
                pathType: Prefix
roles:
  - okdp-server
dependencies:
  - identity
  - ingress
