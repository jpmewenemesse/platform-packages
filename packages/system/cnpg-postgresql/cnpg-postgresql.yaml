apiVersion: v1alpha1
name: cnpg-postgresql
tag: 18.3-p01
protected: false
description: |
  Defines multiple logical PostgreSQL databases managed by the CloudNativePG operator within a single PostgreSQL 
  instance (cluster) and includes ownership, access credentials, and lifecycle management through Kubernetes-native CRDs.
usage:
  text: |
    Databases instances used in the sandbox
modules:
  - name: main
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/cnpg-postgresql
        tag: 0.1.0
    values: |
      replicaCount: 1
      fullnameOverride: {{ regexReplaceAll "-rw.*" .Context.defaultDatabaseServer.provider.endpoints.host "" }}
      
      image:
        repository: ghcr.io/cloudnative-pg/postgresql
        pullPolicy: IfNotPresent
        tag: 18.3
      
      storage:
        size: 2Gi
        class: standard
      
      databases:
      {{ toYaml .Context.defaultDatabaseServer.settings.databases | indent 4 }}
roles:
  - database-server
dependencies:
  - pg-operator
  - external-secrets

