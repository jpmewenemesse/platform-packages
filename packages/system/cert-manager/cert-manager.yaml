apiVersion: v1alpha1
name: cert-manager
tag: 1.17.1-p06
protected: true
schema:
  parameters:
    properties:
      trust:
        properties:
          enabled: { type: boolean, default: false }
          bundle:
            properties:
              name: { type: string, default: certs-bundle }
              target:
                properties:
                  configMap:
                    properties:
                      enabled: { type: boolean, default: false }
                      key: { type: string, default: "root-certs.pem" }
                  secret:
                    properties:
                      enabled: { type: boolean, default: false }
                      key: { type: string, default: "ca.crt" }
      issuers:
        properties:
          enabled: { type: boolean, default: true }
          caClusterIssuers:
            items:
              properties:
                name: { type: string, required: true }
                ca_crt: { type: string, required: true }
                ca_key: { type: string, required: true }
          selfSignedClusterIssuers:
            items:
              type: object
              properties:
                name: { type: string, required: true}
                certificate:
                  type: object
                  properties:
                    commonName: { type: string, default: "Self-Signed CA" }
                    organization: { type: string, default: "OKDP" }
                    country: { type: string, default: "US" }
                    validity: { type: string, default: "8760h" }
                    algorithm: { type: string, default: "ECDSA" }
                    size: { type: integer, default: 256 }
  context:
    properties:
      platform:
        required: true
        properties:
          certificateIssuers:
            required: true
            properties:
              selfSigned:
                required: true
                properties:
                  name: { type: string, required: true }
modules:
  - name: main
    timeout: 10m
    source:
      helmRepository:
        url: https://charts.jetstack.io
        chart: cert-manager
        version: v1.17.1
    values: |
      installCRDs: true
      enableCertificateOwnerRef: true
      image:
        {{ $redirection := imageRedirect "quay.io/jetstack/cert-manager-controller" . }}
        repository: {{ $redirection.repository }}
      webhook:
        extraArgs:
          - "--dynamic-serving-leaf-duration=2160h"    # 90 days validity instead of 7 days
  - name: trust
    timeout: 10m
    enabled: "{{ .Parameters.trust.enabled }}"
    source:
      helmRepository:
        url: https://charts.jetstack.io
        chart: trust-manager
        version: v0.16.0
    values: |
      app:
        trust:
          namespace: {{ .Release.spec.targetNamespace }}
      secretTargets:
        enabled: {{ and .Parameters.trust.enabled .Parameters.trust.bundle.target.secret.enabled }}
        authorizedSecrets:
          - {{ .Parameters.trust.bundle.name }}
      image:
        {{ $redirection := imageRedirect "quay.io/jetstack/trust-manager" . }}
        repository: {{ $redirection.repository }}
    dependsOn:
      - main
  - name: issuers
    enabled: "{{ .Parameters.issuers.enabled }}"
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/cert-issuers
        tag: 0.2.0
    values: |
      {{ toYaml .Parameters.issuers }}
      bundle:
        enabled: true
        name: {{ .Parameters.trust.bundle.name }}
        target:
          configMap:
            enabled: {{ .Parameters.trust.bundle.target.configMap.enabled }}
            key: {{ .Parameters.trust.bundle.target.configMap.key }}
          secret:
            enabled: {{ .Parameters.trust.bundle.target.secret.enabled }}
            key: {{ .Parameters.trust.bundle.target.secret.key }}
          additionalFormats:
            pkcs12:
              enabled: true
              key: "bundle.p12"
    dependsOn: |
      - main
      {{ if and .Parameters.trust.enabled }}
      - trust
      {{ end }}
roles:
  - certManager
dependencies: []
