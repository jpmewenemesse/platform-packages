apiVersion: v1alpha1
name: okdp-ui
tag: 0.4.1-p02
protected: false
description: |
  OKDP UI - Frontend web interface for the Open Kubernetes Data Platform
usage:
  text: |
    OKDP UI provides the web interface for the OKDP platform.
    Access the UI at https://okdp-ui.{{ .Context.platform.ingress.suffix }}
modules:
  - name: main
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/okdp-ui
        tag: 0.4.1
    values: |
      
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $oidcId := .Context.platform.portal.oidc.provider -}}
      {{- $oidcProvider := (index .Context $oidcId).provider -}}
      
      {{- $oidcIssuerUri := $oidcProvider.issuerUri
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}} 
      
      replicaCount: 1

      image:
        repository: quay.io/okdp/okdp-ui
        pullPolicy: Always
        tag: 0.4.1

      ui:
        auth:
          provider: oauth2
          oauth2:
            issuer: {{ $oidcIssuerUri }}
            redirectUri: https://okdp-ui.{{ .Context.platform.ingress.suffix }}/index.html
            silentRefreshRedirectUri: https://okdp-ui.{{ .Context.platform.ingress.suffix }}/silent-refresh.html
            clientId: okdp-ui
            responseType: code
            scope: openid profile email offline_access roles
            showDebugInformation: true
        okdpApi:
          apiUrl: https://okdp-server.{{ .Context.platform.ingress.suffix }}/api/v1
          swaggerUrl: https://okdp-server.{{ .Context.platform.ingress.suffix }}/swagger
        submission:
          mode: kubernetes
        catalogs:
          services:
            {{ toYaml .Context.platform.portal.services | nindent 6 }}
          kad:
            - all
        
        kadCatalogsInfo:
          {{ toYaml .Context.platform.portal.kadCatalogsInfo | nindent 4 }}
        
        kadServicesInfo:
          {{ toYaml .Context.platform.portal.kadServicesInfo | nindent 4 }}
      
      service:
        type: ClusterIP
        port: 4200

      ingress:
        enabled: true
        className: "nginx"
        annotations:
          cert-manager.io/cluster-issuer: "{{ .Context.platform.certificateIssuers.selfSigned.name }}"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
          nginx.ingress.kubernetes.io/use-regex: "true"          
        tls:
          - secretName: okdp-ui-tls
            hosts:
              - okdp-ui.{{ .Context.platform.ingress.suffix }}
        hosts:
          - host: okdp-ui.{{ .Context.platform.ingress.suffix }}
            paths:
            - path: "/"
              pathType: ImplementationSpecific
              backend:
                service:
                  name: okdp-ui-main
                  port:
                    number: 4200
      resources: {}

      livenessProbe:
        httpGet:
          path: /
          port: http
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 10

      readinessProbe:
        httpGet:
          path: /
          port: http

roles:
  - okdp-ui
dependencies:
  - okdp-server
