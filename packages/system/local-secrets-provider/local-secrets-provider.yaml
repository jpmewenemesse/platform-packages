apiVersion: v1alpha1
name: local-secrets-provider
tag: 1.0.0-p03
protected: false
description: |
  A centralized Helm chart for managing and distributing local testing shared configurations, 
  secrets, services, and environment variables across multiple platform components.
usage:
  text: |
    A centralized Helm chart for managing and distributing local testing shared configurations,
    secrets, services, and environment variables across multiple platform components.
modules:
  - name: main
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/dns-server
        tag: 0.1.0
    values: |
      {{- $trinoConnections := (.Context.trino.connections | default list) -}}
      {{- if not (kindIs "slice" $trinoConnections) }}
        {{- fail "context.trino.connections must be a list" -}}
      {{- end }}
      {{- $jupyterConnections := (.Context.jupyterHub.connections | default list) -}}
      {{- if not (kindIs "slice" $jupyterConnections) }}
        {{- fail "context.jupyterHub.connections must be a list" -}}
      {{- end }}
      # In order to have predictable behaviour, we provision the secrets statically
      secrets:
       # Hive metastore  ####################################################################################################
       - name: {{ .Context.hiveMetastore.database.credentialsSecret.name }}
         {{ .Context.hiveMetastore.database.credentialsSecret.usernameKey }}: "hms"
         {{ .Context.hiveMetastore.database.credentialsSecret.passwordKey }}: "hms123"
       - name: {{ .Context.hiveMetastore.storage.credentialsSecret.name }}
         {{ .Context.hiveMetastore.storage.credentialsSecret.accessKeyKey }}: "hive-metastore"
         {{ .Context.hiveMetastore.storage.credentialsSecret.secretKeyKey }}: "rdwFp4MRhDnGGsSJpNQ0CiMIFz56VseWIPMWgKBe"
       
       # Trino Engine #############################################################################################################
       - name: {{ .Context.trino.oidc.credentialsSecret.name }}
         {{ .Context.trino.oidc.credentialsSecret.clientIdKey }}: "trino"
         {{ .Context.trino.oidc.credentialsSecret.clientSecretKey }}: "myTrinoSecret"
       # Trino Catalogs #############################################################################################################
       {{ range $connection := $trinoConnections }}
       {{ if not (and $connection $connection.name) }}
         {{ fail "each item in context.trino.connections must define name" }}
       {{ end }}
       {{ $storageSecret := (dig "storage" "credentialsSecret" nil $connection) }}
       {{ $serviceOidc := (dig "service" "oidc" nil $connection) }}
       {{ $authOidc := (dig "auth" "oidc" nil $connection) }}
       {{ $connectionOidc := ($serviceOidc | default $connection.oidc | default $authOidc | default dict) }}
       {{ $oidcSecret := (dig "credentialsSecret" nil $connectionOidc) }}
       {{ if and $storageSecret $storageSecret.name $storageSecret.accessKeyKey $storageSecret.secretKeyKey }}
       {{ $storageAccessValue := ($storageSecret.name | trimPrefix "creds-" | trimSuffix "-s3") }}
       - name: {{ $storageSecret.name }}
         {{ $storageSecret.accessKeyKey }}: {{ $storageAccessValue | quote }}
         {{ $storageSecret.secretKeyKey }}: "IthuzMjA3fWjGNdHCxE0KaJhx2zY8pxZmmkEqxHg"
       {{ end }}
       {{ if and $oidcSecret $oidcSecret.name $oidcSecret.clientIdKey $oidcSecret.clientSecretKey }}
       {{ $oidcSubject := ($oidcSecret.name | trimPrefix "creds-trino-oauth2-") }}
       {{ if eq $oidcSubject $oidcSecret.name }}
       {{ $oidcSubject = (default "connection" $connection.name) }}
       {{ end }}
       {{ $oidcSubjectPascal := ($oidcSubject | replace "-" " " | title | replace " " "") }}
       - name: {{ $oidcSecret.name }}
         {{ $oidcSecret.clientIdKey }}: {{ printf "svc-trino-%s-writer" $oidcSubject | quote }}
         {{ $oidcSecret.clientSecretKey }}: {{ printf "myTrino%sSecret" $oidcSubjectPascal | quote }}
       {{ end }}
       {{ end }}
       - name: {{ .Context.trino.advanced.config.security.credentialsSecret.name }}
         {{ .Context.trino.advanced.config.security.credentialsSecret.sharedSecret }}: "W5MHhwDUJk+p4nldLU8cBPs8QwekaNPbcN1eWW/Wdos="
      
       # Superset ######################################################################################################
       - name: {{ .Context.superset.database.credentialsSecret.name }}
         {{ .Context.superset.database.credentialsSecret.usernameKey }}: "superset"
         {{ .Context.superset.database.credentialsSecret.passwordKey }}: "superset123"
       - name: {{ .Context.superset.advanced.config.security.credentialsSecret.name }}
         {{ .Context.superset.advanced.config.security.credentialsSecret.key }}: "22NJRoghIFHFK6vo7wWB+m/8TL//eKEo7phKEhGtsGiBLkLpx5WKA7k7"
       - name: {{ .Context.superset.redis.credentialsSecret.name }}
         {{ .Context.superset.redis.credentialsSecret.usernameKey }}: "redis"
         {{ .Context.superset.redis.credentialsSecret.passwordKey }}: "redis123"
       - name: {{ .Context.superset.load_examples.database.credentialsSecret.name }}
         {{ .Context.superset.load_examples.database.credentialsSecret.usernameKey }}: "examples"
         {{ .Context.superset.load_examples.database.credentialsSecret.passwordKey }}: "examples123"
       - name: {{ .Context.superset.oidc.credentialsSecret.name }}
         {{ .Context.superset.oidc.credentialsSecret.clientIdKey }}: "superset"
         {{ .Context.superset.oidc.credentialsSecret.clientSecretKey }}: "mySupersetSecret"
       - name: {{ .Context.superset.trino.oidc.credentialsSecret.name }}
         {{ .Context.superset.trino.oidc.credentialsSecret.clientIdKey }}: "superset-trino"
         {{ .Context.superset.trino.oidc.credentialsSecret.clientSecretKey }}: "mySupersetTrinoSecret"
      
       # Jupyter ######################################################################################################
       - name: {{ .Context.jupyterHub.fileBrowser.credentialsSecret.name }}
         {{ .Context.jupyterHub.fileBrowser.credentialsSecret.accessKeyKey }}: "jupyterhub"
         {{ .Context.jupyterHub.fileBrowser.credentialsSecret.secretKeyKey }}: "4xABAzx5eHAfjf6SSbwFegO3eqrcz3yePEZH2oQz"
       - name: {{ .Context.jupyterHub.oidc.credentialsSecret.name }}
         {{ .Context.jupyterHub.oidc.credentialsSecret.clientIdKey }}: "jupyterhub"
         {{ .Context.jupyterHub.oidc.credentialsSecret.clientSecretKey }}: "myJupyterHubSecret"
         {{ .Context.jupyterHub.oidc.credentialsSecret.jupyterHubCryptKey }}: "335474192a3f8dc949df562a5e0249778100640a760dbfb16e988b6337a3314f"
       {{ range $connection := $jupyterConnections }}
       {{ if not (and $connection $connection.name) }}
         {{ fail "each item in context.jupyterHub.connections must define name" }}
       {{ end }}
       {{ $storageSecret := (dig "storage" "credentialsSecret" nil $connection) }}
       {{ $serviceOidc := (dig "service" "oidc" nil $connection) }}
       {{ $authOidc := (dig "auth" "oidc" nil $connection) }}
       {{ $connectionOidc := ($serviceOidc | default $connection.oidc | default $authOidc | default dict) }}
       {{ $oidcSecret := (dig "credentialsSecret" nil $connectionOidc) }}
       {{ if and $storageSecret $storageSecret.name $storageSecret.accessKeyKey $storageSecret.secretKeyKey }}
       {{ $storageAccessValue := ($storageSecret.name | trimPrefix "creds-" | trimSuffix "-s3") }}
       - name: {{ $storageSecret.name }}
         {{ $storageSecret.accessKeyKey }}: {{ $storageAccessValue | quote }}
         {{ $storageSecret.secretKeyKey }}: "4xABAzx5eHAfjf6SSbwFegO3eqrcz3yePEZH2oQz"
       {{ end }}
       {{ if and $oidcSecret $oidcSecret.name $oidcSecret.clientIdKey $oidcSecret.clientSecretKey }}
       {{ $oidcSubject := ($oidcSecret.name | trimPrefix "creds-jupyterhub-oauth2-") }}
       {{ if eq $oidcSubject $oidcSecret.name }}
       {{ $oidcSubject = (default "connection" $connection.name) }}
       {{ end }}
       {{ $oidcSubjectPascal := ($oidcSubject | replace "-" " " | title | replace " " "") }}
       - name: {{ $oidcSecret.name }}
         {{ $oidcSecret.clientIdKey }}: {{ printf "svc-jupyterhub-%s-writer" $oidcSubject | quote }}
         {{ $oidcSecret.clientSecretKey }}: {{ printf "myJupyterHub%sSecret" $oidcSubjectPascal | quote }}
       {{ end }}
       {{ end }}

       # OKDP examples
       - name: {{ .Context.examples.storage.credentialsSecret.name }}
         {{ .Context.examples.storage.credentialsSecret.accessKeyKey }}: "okdp-examples"
         {{ .Context.examples.storage.credentialsSecret.secretKeyKey }}: "DiP4JtyptKQIVyEufZu2l74WIWYH5fK1tz6GrXgH"
       - name: {{ .Context.examples.trino.oidc.credentialsSecret.name }}
         {{ .Context.examples.trino.oidc.credentialsSecret.clientIdKey }}: "svc-trino-examples-writer"
         {{ .Context.examples.trino.oidc.credentialsSecret.clientSecretKey }}: "myTrinoExamplesSecret"
      
       # Spark History ##################################################################################################
       - name: {{ .Context.sparkHistory.storage.credentialsSecret.name }}
         {{ .Context.sparkHistory.storage.credentialsSecret.accessKeyKey }}: "spark-history"
         {{ .Context.sparkHistory.storage.credentialsSecret.secretKeyKey }}: "9xWCGP9DWn4r9ikF4VhhOfBzbJsO0FpgW7DmIjQh"
       - name: {{ .Context.sparkHistory.oidc.credentialsSecret.name }}
         {{ .Context.sparkHistory.oidc.credentialsSecret.clientIdKey }}: "spark-history"
         {{ .Context.sparkHistory.oidc.credentialsSecret.clientSecretKey }}: "mySparkHistorySecret"
      
       # Airflow ##################################################################################################
       - name: {{ .Context.airflow.oidc.credentialsSecret.name }}
         {{ .Context.airflow.oidc.credentialsSecret.clientIdKey }}: "airflow"
         {{ .Context.airflow.oidc.credentialsSecret.clientSecretKey }}: "myAirflowSecret"
      
       - name: {{ .Context.airflow.advanced.config.security.credentialsSecret.name }}
         # openssl rand -base64 48
         {{ .Context.airflow.advanced.config.security.credentialsSecret.jwtSecret }}: "ZE6j++jLM6VSg1NagnhTKR19PxQezgfkiqUVBVEjWZKGyi61YF7LjtMxJ1oqNs7Q"
         {{ .Context.airflow.advanced.config.security.credentialsSecret.apiSecretKey }}: "Xs8QTL+xU9/70f06izq7fJ4wtFlRNh2wl7z3Cup1bTXaeSERoC8ugyJeS8+zvDBY"
         # python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'
         {{ .Context.airflow.advanced.config.security.credentialsSecret.fernetKey }}: "nHInGS7cIt6UratAOpX30vdmP3bYk0OVFN9gioDeIi0="
      
       # keycloak ##################################################################################################
       - name: {{ .Context.defaultIdp.settings.database.credentialsSecret.name }}
         {{ .Context.defaultIdp.settings.database.credentialsSecret.usernameKey }}: "keycloak"
         {{ .Context.defaultIdp.settings.database.credentialsSecret.passwordKey }}: "keycloak123"
      
       - name: {{ .Context.airflow.database.credentialsSecret.name }}
         connection: "postgresql+psycopg2://airflow:airflow123@{{ .Context.defaultDatabaseServer.provider.endpoints.host }}:{{ .Context.defaultDatabaseServer.provider.endpoints.port }}/{{ .Context.airflow.database.name }}?sslmode=disable"
      
       # Seaweedfs ##################################################################################################
       - name: {{ .Context.defaultStorage.settings.filer.database.credentialsSecret.name }}
         {{ .Context.defaultStorage.settings.filer.database.credentialsSecret.usernameKey }}: "seaweedfs"
         {{ .Context.defaultStorage.settings.filer.database.credentialsSecret.passwordKey }}: "seaweedfs123"
       - name: {{ .Context.defaultStorage.settings.s3.credentialsSecret.name }}
         {{ .Context.defaultStorage.settings.s3.credentialsSecret.accessKeyKey }}: "snu8yoP6QAlY0ne4"
         {{ .Context.defaultStorage.settings.s3.credentialsSecret.secretKeyKey }}: "PNzBcmeLNEdR0oviwm04NQAicOrDH1Km"
       
       # Polaris ##################################################################################################
       - name: {{ .Context.polaris.database.credentialsSecret.name }}
         {{ .Context.polaris.database.credentialsSecret.usernameKey }}: "polaris"
         {{ .Context.polaris.database.credentialsSecret.passwordKey }}: "polaris123"
      # The Polaris SeaweedFS identity for STS
       - name: {{ .Context.polaris.storage.credentialsSecret.name }}
         {{ .Context.polaris.storage.credentialsSecret.accessKeyKey }}: "polaris"
         {{ .Context.polaris.storage.credentialsSecret.secretKeyKey }}: "PNzBcmeLNEdR0oviwm04NQAicOrDH1Km"
       - name: {{ .Context.polaris.oidc.credentialsSecret.name }}
         {{ .Context.polaris.oidc.credentialsSecret.clientIdKey }}: "polaris"
         {{ .Context.polaris.oidc.credentialsSecret.clientSecretKey }}: "myPolarisSecret"
       # Polaris Realms secrets
       {{- range $i, $r := .Context.polaris.realms }}
       # Bootstrap secret for this realm
       - name: {{ $r.rootPrincipal.credentialsSecret.name }}
         {{ $r.rootPrincipal.credentialsSecret.clientIdKey }}: "polaris{{ add $i 1 }}"
         {{ $r.rootPrincipal.credentialsSecret.clientSecretKey }}: "thisIsSecret{{ add $i 1 }}"
       # OIDC principals secrets for this realm
        {{- range $pi, $p := ($r.principals | default list) }}
        {{- with $p.credentialsSecret }}
       - name: {{ .name }}
         {{ .clientIdKey }}: "{{ $p.clientId }}"
         {{ .clientSecretKey }}: "myPolarisAdminSecret"
         {{- end }}
         {{- end }}
       {{- end }}
roles:
  - external-secrets
dependencies:
  - tools
