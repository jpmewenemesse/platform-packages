apiVersion: v1alpha1
name: local-secrets-provider
tag: 1.0.0-p02
protected: false
description: |
  A centralized Helm chart for managing and distributing local testing shared configurations, 
  secrets, services, and environment variables across multiple platform components.
usage:
  text: |
    A centralized Helm chart for managing and distributing local testing shared configurations,
    secrets, services, and environment variables across multiple platform components.
modules:
  - name: main
    timeout: 10m
    source:
      local:
        path: ./chart
    values: |
      # In order to have predictable behaviour, we provision the secrets statically
      secrets:
       # Hive metastore  ####################################################################################################
       - name: {{ .Context.hiveMetastore.database.credentialsSecret.name }}
         {{ .Context.hiveMetastore.database.credentialsSecret.usernameKey }}: "hms"
         {{ .Context.hiveMetastore.database.credentialsSecret.passwordKey }}: "hms123"
       - name: {{ .Context.hiveMetastore.storage.s3.credentialsSecret.name }}
         {{ .Context.hiveMetastore.storage.s3.credentialsSecret.accessKeyKey }}: "hive-metastore"
         {{ .Context.hiveMetastore.storage.s3.credentialsSecret.secretKeyKey }}: "rdwFp4MRhDnGGsSJpNQ0CiMIFz56VseWIPMWgKBe"
       
       # Trino #############################################################################################################
       - name: {{ .Context.trino.storage.s3.credentialsSecret.name }}
         {{ .Context.trino.storage.s3.credentialsSecret.accessKeyKey }}: "trino"
         {{ .Context.trino.storage.s3.credentialsSecret.secretKeyKey }}: "IthuzMjA3fWjGNdHCxE0KaJhx2zY8pxZmmkEqxHg"
       - name: {{ .Context.trino.auth.oidc.credentialsSecret.name }}
         {{ .Context.trino.auth.oidc.credentialsSecret.clientIdKey }}: "trino"
         {{ .Context.trino.auth.oidc.credentialsSecret.clientSecretKey }}: "myTrinoSecret"
       - name: {{ .Context.trino.catalogs.polaris.oidc.credentialsSecret.name }}
         {{ .Context.trino.catalogs.polaris.oidc.credentialsSecret.clientIdKey }}: "trino-polaris"
         {{ .Context.trino.catalogs.polaris.oidc.credentialsSecret.clientSecretKey }}: "myTrinoPolarisSecret"
      
       # Superset ######################################################################################################
       - name: {{ .Context.superset.database.credentialsSecret.name }}
         {{ .Context.superset.database.credentialsSecret.usernameKey }}: "superset"
         {{ .Context.superset.database.credentialsSecret.passwordKey }}: "superset123"
       - name: {{ .Context.superset.secret.name }}
         {{ .Context.superset.secret.key }}: "22NJRoghIFHFK6vo7wWB+m/8TL//eKEo7phKEhGtsGiBLkLpx5WKA7k7"
       - name: {{ .Context.superset.redis.credentialsSecret.name }}
         {{ .Context.superset.redis.credentialsSecret.usernameKey }}: "redis"
         {{ .Context.superset.redis.credentialsSecret.passwordKey }}: "redis123"
       - name: {{ .Context.superset.load_examples.database.credentialsSecret.name }}
         {{ .Context.superset.load_examples.database.credentialsSecret.usernameKey }}: "examples"
         {{ .Context.superset.load_examples.database.credentialsSecret.passwordKey }}: "examples123"
       - name: {{ .Context.superset.auth.oidc.credentialsSecret.name }}
         {{ .Context.superset.auth.oidc.credentialsSecret.clientIdKey }}: "superset"
         {{ .Context.superset.auth.oidc.credentialsSecret.clientSecretKey }}: "mySupersetSecret"
      
       # Jupyter ######################################################################################################
       - name: {{ .Context.jupyterHub.storage.s3.credentialsSecret.name }}
         {{ .Context.jupyterHub.storage.s3.credentialsSecret.accessKeyKey }}: "jupyterhub"
         {{ .Context.jupyterHub.storage.s3.credentialsSecret.secretKeyKey }}: "4xABAzx5eHAfjf6SSbwFegO3eqrcz3yePEZH2oQz"
       - name: {{ .Context.jupyterHub.auth.oidc.credentialsSecret.name }}
         {{ .Context.jupyterHub.auth.oidc.credentialsSecret.clientIdKey }}: "jupyterhub"
         {{ .Context.jupyterHub.auth.oidc.credentialsSecret.clientSecretKey }}: "myJupyterHubSecret"
      
       # OKDP examples
       - name: {{ .Context.examples.storage.s3.credentialsSecret.name }}
         {{ .Context.examples.storage.s3.credentialsSecret.accessKeyKey }}: "okdp-examples"
         {{ .Context.examples.storage.s3.credentialsSecret.secretKeyKey }}: "DiP4JtyptKQIVyEufZu2l74WIWYH5fK1tz6GrXgH"
       
       # Spark History ##################################################################################################
       - name: {{ .Context.sparkHistory.storage.s3.credentialsSecret.name }}
         {{ .Context.sparkHistory.storage.s3.credentialsSecret.accessKeyKey }}: "spark-history"
         {{ .Context.sparkHistory.storage.s3.credentialsSecret.secretKeyKey }}: "9xWCGP9DWn4r9ikF4VhhOfBzbJsO0FpgW7DmIjQh"
       - name: {{ .Context.sparkHistory.auth.oidc.credentialsSecret.name }}
         {{ .Context.sparkHistory.auth.oidc.credentialsSecret.clientIdKey }}: "spark-history"
         {{ .Context.sparkHistory.auth.oidc.credentialsSecret.clientSecretKey }}: "mySparkHistorySecret"
      
       # keycloak ##################################################################################################
       - name: {{ .Context.keycloak.database.credentialsSecret.name }}
         {{ .Context.keycloak.database.credentialsSecret.usernameKey }}: "keycloak"
         {{ .Context.keycloak.database.credentialsSecret.passwordKey }}: "keycloak123"

       - name: {{ .Context.airflow.database.credentialsSecret.name }}
         {{ .Context.airflow.database.credentialsSecret.usernameKey }}: "airflow"
         {{ .Context.airflow.database.credentialsSecret.passwordKey }}: "airflow123"
       - name: creds-airflow-metadata
         connection: "postgresql+psycopg2://airflow:airflow123@{{ .Context.airflow.database.host }}:{{ .Context.airflow.database.port }}/{{ .Context.airflow.database.name }}?sslmode=disable"
       - name: {{ .Context.airflow.storage.s3.credentialsSecret.name }}
         {{ .Context.airflow.storage.s3.credentialsSecret.accessKeyKey }}: "snu8yoP6QAlY0ne4"
         {{ .Context.airflow.storage.s3.credentialsSecret.secretKeyKey }}: "PNzBcmeLNEdR0oviwm04NQAicOrDH1Km"
       # Seaweedfs ##################################################################################################
       - name: {{ .Context.seaweedfs.filer.database.credentialsSecret.name }}
         {{ .Context.seaweedfs.filer.database.credentialsSecret.usernameKey }}: "seaweedfs"
         {{ .Context.seaweedfs.filer.database.credentialsSecret.passwordKey }}: "seaweedfs123"
       - name: {{ .Context.seaweedfs.s3.credentialsSecret.name }}
         {{ .Context.seaweedfs.s3.credentialsSecret.accessKeyKey }}: "snu8yoP6QAlY0ne4"
         {{ .Context.seaweedfs.s3.credentialsSecret.secretKeyKey }}: "PNzBcmeLNEdR0oviwm04NQAicOrDH1Km"
       
       # Polaris ##################################################################################################
       - name: {{ .Context.polaris.database.credentialsSecret.name }}
         {{ .Context.polaris.database.credentialsSecret.usernameKey }}: "polaris"
         {{ .Context.polaris.database.credentialsSecret.passwordKey }}: "polaris123"
      # The Polaris SeaweedFS identity for STS
       - name: {{ .Context.polaris.storage.s3.credentialsSecret.name }}
         {{ .Context.polaris.storage.s3.credentialsSecret.accessKeyKey }}: "polaris"
         {{ .Context.polaris.storage.s3.credentialsSecret.secretKeyKey }}: "PNzBcmeLNEdR0oviwm04NQAicOrDH1Km"
       - name: {{ .Context.polaris.auth.oidc.credentialsSecret.name }}
         {{ .Context.polaris.auth.oidc.credentialsSecret.clientIdKey }}: "polaris"
         {{ .Context.polaris.auth.oidc.credentialsSecret.clientSecretKey }}: "myPolarisSecret"
       # Polaris Realms secrets
       {{- range $i, $r := .Context.polaris.realms }}
       # Bootstrap secret for this realm
       - name: {{ $r.rootPrincipal.credentialsSecret.name }}
         {{ $r.rootPrincipal.credentialsSecret.clientIdKey }}: "polaris{{ add $i 1 }}"
         {{ $r.rootPrincipal.credentialsSecret.clientSecretKey }}: "thisIsSecret{{ add $i 1 }}"
       # OIDC principals secrets for this realm
        {{- range $pi, $p := ($r.principals | default list) }}
        {{- with $p.credentialsSecret }}
       - name: {{ .name }}
         {{ .clientIdKey }}: "{{ $p.clientId }}"
         {{ .clientSecretKey }}: "myPolarisAdminSecret"
         {{- end }}
         {{- end }}
       {{- end }}
roles:
  - external-secrets
