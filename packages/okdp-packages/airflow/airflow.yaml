apiVersion: v1alpha1
name: airflow
tag: 2.9.3-p10
protected: false
description: |
  Apache Airflow 2.9.3 - Workflow orchestration platform with Spark Operator integration

usage:
  text: |
    Apache Airflow release has been applied successfully.
    Pods, ingress, and certificate provisioning may still take a few minutes.

    Access the Airflow UI:
      URL: https://airflow-{{ .Release.spec.targetNamespace }}.{{ .Context.ingress.suffix }}
      Alternate URL: https://airflow.{{ .Context.ingress.suffix }}
      Authenticate via Keycloak (use the credentials provisioned in your sandbox).

    Note:
      This sandbox uses a self-signed TLS issuer by default.
      If the browser shows NET::ERR_CERT_AUTHORITY_INVALID, use "Advanced" -> "Proceed"
      or trust the cluster certificate authority locally.

schema:
  parameters:
    properties:
      dagsSource:
        type: string
        default: git
        description: "DAG source mode. Supported values: git, s3 (local requires manual DAG injection)"
      dagSyncIntervalSeconds:
        type: integer
        default: 60
        description: "Sync interval for gitSync or S3 sidecar"
      dagGitRepo:
        type: string
        default: https://github.com/OKDP/okdp-sandbox.git
        description: "Git repository URL used when dagsSource=git"
      dagGitBranch:
        type: string
        default: main
        description: "Git branch used when dagsSource=git"
      dagGitRef:
        type: string
        default: HEAD
        description: "Git ref used when dagsSource=git"
      dagGitDepth:
        type: integer
        default: 1
        description: "Git clone depth when dagsSource=git"
      dagGitSubPath:
        type: string
        default: examples/airflow/dags
        description: "Sub-path inside the Git repo where DAGs are stored"
      dagGitCredentialsSecret:
        type: string
        default: ""
        description: "Optional secret with git credentials (GITSYNC_USERNAME/GITSYNC_PASSWORD)"
      dagS3Bucket:
        type: string
        default: ""
        description: "Optional S3 bucket used when dagsSource=s3 (falls back to context airflow.storage.s3.bucket)"
      dagS3Prefix:
        type: string
        default: dags
        description: "S3 prefix containing DAG files when dagsSource=s3"
      dagS3Image:
        type: string
        default: bitnami/aws-cli:2.17.0
        description: "Image used by S3 DAG sync sidecars"
  context:
    properties:
      certificateIssuers:
        required: true
        properties:
          selfSigned:
            properties:
              name: { type: string, required: true }
      ingress:
        required: true
        properties:
          suffix: { type: string, required: true }
      airflow:
        required: true
        properties:
          auth:
            properties:
              enabled: { type: boolean }
              method: { type: string }
              oidc:
                properties:
                  provider: { type: string }
                  baseUrl: { type: string }
                  scope: { type: string }
                  insecureSkipVerify: { type: boolean }
                  credentialsSecret:
                    properties:
                      name: { type: string }
                      clientIdKey: { type: string }
                      clientSecretKey: { type: string }
          database:
            required: true
            properties:
              name: { type: string, required: true }
              host: { type: string, required: true }
              port: { type: integer, required: true }
              credentialsSecret:
                required: true
                properties:
                  name: { type: string, required: true }
                  usernameKey: { type: string, required: true }
                  passwordKey: { type: string, required: true }
          storage:
            properties:
              s3:
                properties:
                  apiUrl: { type: string }
                  bucket: { type: string }
                  credentialsSecret:
                    properties:
                      name: { type: string }
                      accessKeyKey: { type: string }
                      secretKeyKey: { type: string }
                  tls:
                    properties:
                      insecureSkipVerify: { type: boolean }

modules:
  - name: main
    timeout: 15m
    source:
      helmRepository:
        url: https://airflow.apache.org
        chart: airflow
        version: 1.17.0
    values: |
      executor: LocalExecutor

      defaultAirflowTag: "2.9.3"
      airflowVersion: "2.9.3"
      {{ $dagsSource := default "git" .Parameters.dagsSource }}
      {{ $dagSyncIntervalSeconds := default 60 .Parameters.dagSyncIntervalSeconds }}
      {{- $airflowAuth := .Context.airflow.auth | default dict }}
      {{- $airflowOidc := $airflowAuth.oidc | default dict }}
      {{- $airflowOidcEnabled := and ($airflowAuth.enabled | default false) (eq ($airflowAuth.method | default "") "oidc") }}
      {{- $airflowOidcBaseUrl := (default "" $airflowOidc.baseUrl) | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace | replace "{{ .Release.metadata.name }}" .Release.metadata.name | replace "{{ .Context.ingress.suffix }}" .Context.ingress.suffix }}
      {{- $airflowOidcRealmUrl := trimSuffix "/protocol/openid-connect" $airflowOidcBaseUrl }}

      webserver:
        defaultUser:
          enabled: true
          role: Admin
          username: admin
          email: admin@example.com
          firstName: admin
          lastName: user
          password: admin
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
        startupProbe:
          failureThreshold: 24
          timeoutSeconds: 30
        {{- if $airflowOidcEnabled }}
        extraConfigmapMounts:
          - name: airflow-webserver-config
            mountPath: /opt/airflow/webserver_config.py
            subPath: webserver_config.py
        extraEnv:
          - name: AIRFLOW_OIDC_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Context.airflow.auth.oidc.credentialsSecret.name }}
                key: {{ .Context.airflow.auth.oidc.credentialsSecret.clientIdKey }}
          - name: AIRFLOW_OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ .Context.airflow.auth.oidc.credentialsSecret.name }}
                key: {{ .Context.airflow.auth.oidc.credentialsSecret.clientSecretKey }}
          - name: AIRFLOW_OIDC_API_BASE_URL
            value: {{ $airflowOidcBaseUrl | quote }}
          - name: AIRFLOW_OIDC_ACCESS_TOKEN_URL
            value: {{ printf "%s/token" $airflowOidcBaseUrl | quote }}
          - name: AIRFLOW_OIDC_AUTHORIZE_URL
            value: {{ printf "%s/auth" $airflowOidcBaseUrl | quote }}
          - name: AIRFLOW_OIDC_SERVER_METADATA_URL
            value: {{ printf "%s/.well-known/openid-configuration" $airflowOidcRealmUrl | quote }}
          - name: AIRFLOW_OIDC_SCOPE
            value: {{ .Context.airflow.auth.oidc.scope | quote }}
          - name: AIRFLOW_OIDC_VERIFY_TLS
            value: {{ if .Context.airflow.auth.oidc.insecureSkipVerify }}"false"{{ else }}"true"{{ end }}
        {{- end }}
        {{- if eq $dagsSource "s3" }}
        extraVolumes:
          - name: dags-shared
            emptyDir: {}
        extraVolumeMounts:
          - name: dags-shared
            mountPath: /opt/airflow/dags
        extraContainers:
          - name: dags-s3-sync
            image: {{ default "bitnami/aws-cli:2.17.0" .Parameters.dagS3Image | quote }}
            imagePullPolicy: IfNotPresent
            command: ["/bin/sh", "-ec"]
            args:
              - |
                set -euo pipefail
                while true; do
                  if [ -n "$AIRFLOW_DAGS_S3_PREFIX" ]; then
                    DAGS_URI="s3://$AIRFLOW_DAGS_S3_BUCKET/$AIRFLOW_DAGS_S3_PREFIX"
                  else
                    DAGS_URI="s3://$AIRFLOW_DAGS_S3_BUCKET"
                  fi
                  echo "Syncing DAGs from $DAGS_URI"
                  if aws --endpoint-url "$AIRFLOW_DAGS_S3_ENDPOINT" s3 sync "$DAGS_URI" /opt/airflow/dags --delete --no-progress{{- if .Context.airflow.storage.s3.tls.insecureSkipVerify }} --no-verify-ssl{{- end }}; then
                    echo "DAG sync completed"
                  else
                    echo "DAG sync failed, retrying..."
                  fi
                  sleep {{ $dagSyncIntervalSeconds }}
                done
            env:
              - name: AIRFLOW_DAGS_S3_BUCKET
                value: {{ default .Context.airflow.storage.s3.bucket .Parameters.dagS3Bucket | quote }}
              - name: AIRFLOW_DAGS_S3_PREFIX
                value: {{ default "dags" .Parameters.dagS3Prefix | quote }}
              - name: AIRFLOW_DAGS_S3_ENDPOINT
                value: {{ .Context.airflow.storage.s3.apiUrl | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace | replace "{{ .Release.metadata.name }}" .Release.metadata.name | replace "{{ .Context.ingress.suffix }}" .Context.ingress.suffix | quote }}
              - name: AWS_DEFAULT_REGION
                value: "us-east-1"
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: {{ .Context.airflow.storage.s3.credentialsSecret.name }}
                    key: {{ .Context.airflow.storage.s3.credentialsSecret.accessKeyKey }}
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Context.airflow.storage.s3.credentialsSecret.name }}
                    key: {{ .Context.airflow.storage.s3.credentialsSecret.secretKeyKey }}
            volumeMounts:
              - name: dags-shared
                mountPath: /opt/airflow/dags
            resources:
              requests:
                memory: "64Mi"
                cpu: "25m"
              limits:
                memory: "256Mi"
                cpu: "200m"
        {{- end }}

      scheduler:
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
        startupProbe:
          failureThreshold: 12
          timeoutSeconds: 60
        {{- if eq $dagsSource "s3" }}
        extraVolumes:
          - name: dags-shared
            emptyDir: {}
        extraVolumeMounts:
          - name: dags-shared
            mountPath: /opt/airflow/dags
        extraContainers:
          - name: dags-s3-sync
            image: {{ default "bitnami/aws-cli:2.17.0" .Parameters.dagS3Image | quote }}
            imagePullPolicy: IfNotPresent
            command: ["/bin/sh", "-ec"]
            args:
              - |
                set -euo pipefail
                while true; do
                  if [ -n "$AIRFLOW_DAGS_S3_PREFIX" ]; then
                    DAGS_URI="s3://$AIRFLOW_DAGS_S3_BUCKET/$AIRFLOW_DAGS_S3_PREFIX"
                  else
                    DAGS_URI="s3://$AIRFLOW_DAGS_S3_BUCKET"
                  fi
                  echo "Syncing DAGs from $DAGS_URI"
                  if aws --endpoint-url "$AIRFLOW_DAGS_S3_ENDPOINT" s3 sync "$DAGS_URI" /opt/airflow/dags --delete --no-progress{{- if .Context.airflow.storage.s3.tls.insecureSkipVerify }} --no-verify-ssl{{- end }}; then
                    echo "DAG sync completed"
                  else
                    echo "DAG sync failed, retrying..."
                  fi
                  sleep {{ $dagSyncIntervalSeconds }}
                done
            env:
              - name: AIRFLOW_DAGS_S3_BUCKET
                value: {{ default .Context.airflow.storage.s3.bucket .Parameters.dagS3Bucket | quote }}
              - name: AIRFLOW_DAGS_S3_PREFIX
                value: {{ default "dags" .Parameters.dagS3Prefix | quote }}
              - name: AIRFLOW_DAGS_S3_ENDPOINT
                value: {{ .Context.airflow.storage.s3.apiUrl | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace | replace "{{ .Release.metadata.name }}" .Release.metadata.name | replace "{{ .Context.ingress.suffix }}" .Context.ingress.suffix | quote }}
              - name: AWS_DEFAULT_REGION
                value: "us-east-1"
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: {{ .Context.airflow.storage.s3.credentialsSecret.name }}
                    key: {{ .Context.airflow.storage.s3.credentialsSecret.accessKeyKey }}
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Context.airflow.storage.s3.credentialsSecret.name }}
                    key: {{ .Context.airflow.storage.s3.credentialsSecret.secretKeyKey }}
            volumeMounts:
              - name: dags-shared
                mountPath: /opt/airflow/dags
            resources:
              requests:
                memory: "64Mi"
                cpu: "25m"
              limits:
                memory: "256Mi"
                cpu: "200m"
        {{- end }}

      triggerer:
        enabled: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "300m"

      ingress:
        web:
          enabled: true
          ingressClassName: nginx
          annotations:
            kubernetes.io/ingress.class: nginx
            cert-manager.io/cluster-issuer: {{ .Context.certificateIssuers.selfSigned.name }}
            acme.cert-manager.io/http01-edit-in-place: "true"
            nginx.ingress.kubernetes.io/proxy-body-size: "0"

          hosts:
            - name: airflow-{{ .Release.spec.targetNamespace }}.{{ .Context.ingress.suffix }}
              tls:
                enabled: true
                secretName: airflow-tls
            - name: airflow.{{ .Context.ingress.suffix }}
              tls:
                enabled: true
                secretName: airflow-tls

      # Use the shared CNPG PostgreSQL instance instead of the bundled bitnami subchart
      postgresql:
        enabled: false

      # Point to the pre-provisioned secret (via local-secrets-provider) that holds the
      # full SQLAlchemy connection string. The chart skips generating its own airflow-metadata
      # secret, so credentials never appear in the package values.
      data:
        metadataSecretName: creds-airflow-metadata

      redis:
        enabled: false

      workers:
        replicas: 0

      dagProcessor:
        enabled: false

      dags:
        mountPath: /opt/airflow/dags
        persistence:
          enabled: false
        gitSync:
          enabled: {{ eq $dagsSource "git" }}
          repo: {{ default "https://github.com/OKDP/okdp-sandbox.git" .Parameters.dagGitRepo | quote }}
          branch: {{ default "main" .Parameters.dagGitBranch | quote }}
          ref: {{ default "HEAD" .Parameters.dagGitRef | quote }}
          depth: {{ default 1 .Parameters.dagGitDepth }}
          subPath: {{ default "examples/airflow/dags" .Parameters.dagGitSubPath | quote }}
          period: "{{ $dagSyncIntervalSeconds }}s"
          {{- if .Parameters.dagGitCredentialsSecret }}
          credentialsSecret: {{ .Parameters.dagGitCredentialsSecret | quote }}
          {{- end }}
          {{- if or .Context.proxy.httpProxy .Context.proxy.httpsProxy .Context.proxy.noProxy }}
          env:
            {{- if .Context.proxy.httpProxy }}
            - name: HTTP_PROXY
              value: {{ .Context.proxy.httpProxy | quote }}
            {{- end }}
            {{- if .Context.proxy.httpsProxy }}
            - name: HTTPS_PROXY
              value: {{ .Context.proxy.httpsProxy | quote }}
            {{- end }}
            {{- if .Context.proxy.noProxy }}
            - name: NO_PROXY
              value: {{ .Context.proxy.noProxy | quote }}
            {{- end }}
          {{- end }}

      flower:
        enabled: false
      pgbouncer:
        enabled: false
      statsd:
        enabled: false

      migrateDatabaseJob:
        enabled: true
        useHelmHooks: false
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "256Mi"
            cpu: "200m"

      createUserJob:
        useHelmHooks: false
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "256Mi"
            cpu: "200m"

      config:
        core:
          load_examples: 'False'

roles:
  - airflow

dependencies:
  - external-secrets
  - database-server
  - ingress
