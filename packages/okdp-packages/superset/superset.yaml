apiVersion: v1alpha1
name: superset
tag: 6.0.0-p01
protected: false
description: |
  Apache Superset - Enterprise business intelligence platform for modern data teams.
  Self-service analytics tool that enables users to create interactive dashboards, explore datasets,
  and build data visualizations without coding. Integrates with popular databases and supports SQL Lab.
usage:
  text: |
    Apache Superset provides modern data visualization and exploration capabilities.
    Access the UI at {{ 
     .Context.superset.endpoints.url 
     | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace 
     | replace "{{ .Release.metadata.name }}" .Release.metadata.name 
     | replace "{{ .Context.ingress.suffix }}" .Context.platform.ingress.suffix
    }}
schema:
  parameters:
    properties:
      load_examples: { type: boolean, default: true, description: "Whether to load superset examples" }
  context:
    properties:
      platform:
        required: true
        properties:
          certificateIssuers:
            required: true
            properties:
              selfSigned:
                properties:
                  name: { type: string, required: true }
          ingress:
            required: true
            properties:
              suffix: { type: string, required: true }
modules:
  - name: main
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/superset
        tag: 0.15.2-2.0
    values: |

      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $databaseId := .Context.superset.database.provider -}}
      {{- $databaseProvider := (index .Context $databaseId).provider -}}
      {{- $databaseHost := $databaseProvider.endpoints.host
        | replace "{{ .Release.namespace }}" $namespace
        | replace "{{ .Release.metadata.name }}" $release
        | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $databasePort := printf "%v" $databaseProvider.endpoints.port -}}
      
      {{- $examplesDatabaseId := .Context.superset.load_examples.database.provider -}}
      {{- $examplesDatabaseProvider := (index .Context $examplesDatabaseId).provider -}}
      {{- $examplesDatabaseHost := $examplesDatabaseProvider.endpoints.host
        | replace "{{ .Release.namespace }}" $namespace
        | replace "{{ .Release.metadata.name }}" $release
        | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $examplesDatabasePort := printf "%v" $examplesDatabaseProvider.endpoints.port -}}
      {{- $examplesDatabaseJdbcUrl := .Context.superset.load_examples.database.connection.jdbcUrl
        | replace "{{ connection.host }}" $examplesDatabaseHost
        | replace "{{ connection.port }}" $examplesDatabasePort
        | replace "{{ dbName }}" .Context.superset.load_examples.database.name 
        | replace "{{ username }}" "$DB_EXAMPLES_USER"
        | replace "{{ password }}" "$DB_EXAMPLES_PASS" -}}
      
      {{- $oidcId := .Context.superset.oidc.provider -}}
      {{- $oidcProvider := (index .Context $oidcId).provider -}}
      
      {{- $oidcName := $oidcProvider.name -}}
      
      {{- $oidcBaseUrl := $oidcProvider.baseUri
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $supersetOidc := .Context.superset.oidc | default dict }}
      {{- $supersetOidcEnabled := $supersetOidc.enabled | default false }}
      {{- $supersetOidcRoleMapping := $supersetOidc.roleMapping | default dict }}
      
      {{- $supersetUrl := .Context.superset.endpoints.url 
          | replace "{{ .Release.namespace }}" $namespace
          | replace "{{ .Release.metadata.name }}" $release
          | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $supersetHost := regexReplaceAll "^https?://" $supersetUrl "" -}}
      {{- $supersetConnectionsRaw := (.Context.superset.connections | default list) -}}
      {{- if not (kindIs "slice" $supersetConnectionsRaw) }}
        {{- fail "context.superset.connections must be a list" -}}
      {{- end }}
      {{- $supersetConnections := dict -}}
      {{- range $connection := $supersetConnectionsRaw }}
        {{- if not (and $connection $connection.name) }}
          {{- fail "each item in context.superset.connections must define name" -}}
        {{- end }}
        {{- $_ := set $supersetConnections $connection.name $connection -}}
      {{- end }}
      {{- $supersetDataSourcesRaw := (.Context.superset.dataSources | default "") -}}
      {{- $supersetDataSources := ($supersetDataSourcesRaw | fromYaml | default dict) -}}
      {{- $selectedDatabases := (dig "databases" nil $supersetDataSources | default list) -}}
      {{- if not (kindIs "slice" $selectedDatabases) }}
        {{- fail "context.superset.dataSources.databases must be a list" -}}
      {{- end }}
      {{- $importDataSources := dict "databases" (list) -}}
      {{- range $databaseName := $selectedDatabases }}
        {{- $connection := index $supersetConnections $databaseName -}}
        {{- if $connection }}
          {{- $connectionYaml := $connection.yaml -}}
          {{- $serviceId := dig "service" "name" "" $connection -}}
          {{- $connectionYaml = $connectionYaml
                | replace "{{ connection.name }}" $databaseName
                | replace "{{ database.name }}" $databaseName -}}
          {{- if $serviceId }}
            {{- $service := index $.Context $serviceId -}}
            {{- $serviceUri := $service.endpoints.uri
                  | replace "{{ .Release.namespace }}" $namespace
                  | replace "{{ .Release.metadata.name }}" $release
                  | replace "{{ .Context.ingress.suffix }}" $domain -}}
            {{- $connectionYaml = $connectionYaml
                  | replace "{{ service.endpoint.uri }}" $serviceUri
                  | replace "{{ service.endpoints.uri }}" $serviceUri -}}
          {{- end }}
          {{- $connectionYaml = $connectionYaml
                | replace "{{ .Release.namespace }}" $namespace
                | replace "{{ .Release.metadata.name }}" $release
                | replace "{{ .Context.ingress.suffix }}" $domain -}}
          {{- $connectionConfig := ($connectionYaml | fromYaml) -}}
          {{- if $connectionConfig }}
            {{- $_ := set $importDataSources "databases" (append (get $importDataSources "databases") $connectionConfig) -}}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- $importDataSourcesYaml := toYaml $importDataSources -}}
            
      okdp:
        # Superset configuration
        superset:
          superset_secret_key: ~
          extra_config: &extra_config |
            from datetime import timedelta
            # Set up max age of session to 8 hours
            PERMANENT_SESSION_LIFETIME = timedelta(hours=8)
            # This will make sure the redirect_uri is properly computed, even with SSL offloading
            ENABLE_PROXY_FIX = True
            PROXY_FIX_CONFIG = {
              "x_for": 1,
              "x_proto": 1,
              "x_host": 1,
              "x_port": 1,
              "x_prefix": 1,
            }
          feature_flags: &feature_flags |
            # https://github.com/apache/superset/blob/master/RESOURCES/FEATURE_FLAGS.md
            FEATURE_FLAGS = {
              "DASHBOARD_RBAC": True,
              "EMBEDDED_SUPERSET": True,
              "EMBEDDABLE_CHARTS": True,
              "ENABLE_TEMPLATE_PROCESSING": True,
              "DASHBOARD_NATIVE_FILTERS": True,
              "DASHBOARD_CROSS_FILTERS": True,
            }
          load_examples:
            enabled: {{ .Parameters.load_examples }}
            jdbc_uri: {{ $examplesDatabaseJdbcUrl }}

        # Oauth2 configuration
        oauth:
          enabled: {{ .Context.superset.oidc.enabled }}
          provider: "{{ $oidcName }}"
          base_url: {{ $oidcBaseUrl }}
          scope: "{{ .Context.superset.oidc.scope }}"
          use_pkce: {{ .Context.superset.oidc.usePKCE }}
          auth_registration: &auth_registration |
            AUTH_USER_REGISTRATION = True
            AUTH_ROLE_PUBLIC = "Public"
            AUTH_USER_REGISTRATION_ROLE = "Public"
            AUTH_ROLES_SYNC_AT_LOGIN = True
          oauth2_superset_roles_mapping: &oauth2_superset_roles_mapping |
            AUTH_ROLES_MAPPING = {
            {{- range $oidcRole, $supersetRoles := $supersetOidcRoleMapping }}
              {{ $oidcRole | quote }}: {{ $supersetRoles | toJson }},
            {{- end }}
            }
        
        trino:
          oauth:
            enabled: {{ .Context.superset.trino.oidc.enabled }}
            base_url: {{ $oidcBaseUrl }}
            scope: "{{ .Context.superset.trino.oidc.scope }}"
      
      superset:
        image:
          repository: quay.io/okdp/superset
          tag: 6.0.0
          pullPolicy: IfNotPresent
        initImage:
          repository: quay.io/okdp/superset
          tag: 6.0.0-dockerize
          pullPolicy: IfNotPresent      
        supersetWebsockets:
          image:
            repository: quay.io/okdp/superset
            tag: 6.0.0-websocket
            pullPolicy: IfNotPresent
      
        extraConfigs:
          import_datasources.yaml: |
            {{ $importDataSourcesYaml | trim | nindent 14 }}
        postgresql:
          # Use an external database
          enabled: false
        # If no existing redis cache provided, enable to use the bitnami redis cache
        # The credentials should match 'superset.supersetNode.connections'
        redis:
          enabled: true
          architecture: standalone
          auth:
            ## Enable password authentication
            enabled: false
        extraEnvRaw:
          # Superset secret key
          - name: SUPERSET_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.advanced.config.security.credentialsSecret.name }}
                key: {{ .Context.superset.advanced.config.security.credentialsSecret.key }}
          # Superset/DB credentials
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.database.credentialsSecret.name }}
                key: {{ .Context.superset.database.credentialsSecret.usernameKey }}
          - name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.database.credentialsSecret.name }}
                key: {{ .Context.superset.database.credentialsSecret.passwordKey }}
          # Superset/Redis credentials
          - name: REDIS_USER
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.redis.credentialsSecret.name }}
                key: {{ .Context.superset.redis.credentialsSecret.usernameKey }}
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.redis.credentialsSecret.name }}
                key: {{ .Context.superset.redis.credentialsSecret.passwordKey }}
          # OIDC credentials
          - name: AUTH_OAUTH_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.oidc.credentialsSecret.name }}
                key: {{ .Context.superset.oidc.credentialsSecret.clientIdKey }}
          - name: AUTH_OAUTH_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.oidc.credentialsSecret.name }}
                key: {{ .Context.superset.oidc.credentialsSecret.clientSecretKey }}
          # OIDC Trino credentials
          - name: TRINO_OAUTH_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.trino.oidc.credentialsSecret.name }}
                key: {{ .Context.superset.trino.oidc.credentialsSecret.clientIdKey }}
          - name: TRINO_OAUTH_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.trino.oidc.credentialsSecret.name }}
                key: {{ .Context.superset.trino.oidc.credentialsSecret.clientSecretKey }}
          # CA
          - name: REQUESTS_CA_BUNDLE
            value: /cacerts/ca.crt
      
          {{- if .Context.platform.proxy.httpProxy }}
          - name: HTTP_PROXY
            value: {{ .Context.platform.proxy.httpProxy | quote }}
          {{- end }}
          {{- if .Context.platform.proxy.httpsProxy }}
          - name: HTTPS_PROXY
            value: {{ .Context.platform.proxy.httpsProxy | quote }}
          {{- end }}
          {{- if .Context.platform.proxy.noProxy }}
          - name: NO_PROXY
            value: {{ .Context.platform.proxy.noProxy | quote }}
          {{- end }}
          # Examples
          {{- if .Parameters.load_examples }}
          - name: DB_EXAMPLES_HOST
            value: {{ $examplesDatabaseHost }}
          - name: DB_EXAMPLES_PORT
            value: "{{ $examplesDatabasePort }}"
          - name: DB_EXAMPLES_NAME
            value: {{ .Context.superset.load_examples.database.name }}
          - name: DB_EXAMPLES_USER
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.load_examples.database.credentialsSecret.name }}
                key: {{ .Context.superset.load_examples.database.credentialsSecret.usernameKey }}         
          - name: DB_EXAMPLES_PASS
            valueFrom:
              secretKeyRef:
                name: {{ .Context.superset.load_examples.database.credentialsSecret.name }}
                key: {{ .Context.superset.load_examples.database.credentialsSecret.passwordKey }}            
          {{- end }}
        supersetNode:
          # Connections to an existing database and cache
          connections:
            # -- PostgreSQL
            db_host: "{{ $databaseHost }}"
            db_port: "{{ $databasePort }}"
            db_name: {{ .Context.superset.database.name }}
            db_user: ~
            db_pass: ~
            # -- Redis
            redis_host: {{ default (printf "%s-main-redis-headless" $release) .Context.superset.redis.host | quote }}
            redis_port: {{ .Context.superset.redis.port }}
            redis_user: ~
            redis_password: ~
            redis_cache_db: "1"
            redis_celery_db: "0"
            redis_ssl:
              enabled: false
              ssl_cert_reqs: CERT_NONE
            
        ingress:
          enabled: true
          ingressClassName: "nginx"
          annotations:
            kubernetes.io/ingress.class: nginx
            cert-manager.io/cluster-issuer: {{ .Context.platform.certificateIssuers.selfSigned.name }}
            acme.cert-manager.io/http01-edit-in-place: "true"
            # kubernetes.io/tls-acme: "true"
            ## Extend timeout to allow long running queries.
            nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
            nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
            nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
            nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
          path: /
          pathType: ImplementationSpecific
          hosts:
            - {{ $supersetHost }}
          tls:
            - hosts:
                - {{ $supersetHost }}
              secretName: "{{ $release }}-tls-secret"
      
        configOverrides:
          auth_registration: *auth_registration
          oauth_to_superset_roles_mapping: *oauth2_superset_roles_mapping
          extra_config: *extra_config
          feature_flags: *feature_flags
      
        extraVolumes:
          - name: cacerts
            secret:
              secretName: certs-bundle
        
        extraVolumeMounts:
          - name: cacerts
            mountPath: /cacerts

roles:
  - dataviz
dependencies:
  - database-server
  - ingress
