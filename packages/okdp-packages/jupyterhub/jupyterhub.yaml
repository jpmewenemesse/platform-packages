apiVersion: v1alpha1
name: jupyterhub
tag: 4.3.3-p01
protected: false
description: |
  JupyterHub - Multi-user interactive development environment for data science and machine learning.
  Provides secure, scalable Jupyter notebook access with integrated authentication, resource management,
  and pre-configured Spark-enabled notebooks for big data analytics.
usage:
  text: |
    JupyterHub provides multi-user Jupyter notebook environment with OAuth authentication.
    Access the hub at {{ .Context.jupyterHub.endpoints.url | replace "{{ .Release.namespace }}" .Release.spec.targetNamespace | replace "{{ .Release.metadata.name }}" .Release.metadata.name | replace "{{ .Context.ingress.suffix }}" .Context.platform.ingress.suffix }}
schema:
  parameters:
    properties:
      startTimeout: { type: integer, default: 600, description: "Maximum number of seconds JupyterHub will wait for a user’s server to become reachable" }
      memoryGi: { type: number, default: 1, multipleOf: 0.25, description: "Notebook (singleuser) pod memory (GiB) for requests/limits." }
      cpu:      { type: number, default: 0.5, multipleOf: 0.25, description: "Notebook (singleuser) pod CPU (vCPU) for requests/limits." }
  context:
    properties:
      platform:
        required: true
        properties:
          certificateIssuers:
            required: true
            properties:
              selfSigned:
                properties:
                  name: { type: string, required: true }
          ingress:
            required: true
            properties:
              suffix: { type: string, required: true }
          storageClass:
            required: true
            properties:
              workspace: { type: string, required: true }
modules:
  - name: spark-rbac
    timeout: 10m
    source:
      oci:
        repository: quay.io/okdp/charts/spark-rbac
        tag: 1.0.1
    values: |
      rbac:
        create: {{ .Context.spark.rbac.rbac.create }}
      serviceAccount:
        create: {{ .Context.spark.rbac.serviceAccount.create }}
        name: "{{ .Context.spark.rbac.serviceAccount.name }}"
        automountServiceAccountToken: {{ .Context.spark.rbac.serviceAccount.automountServiceAccountToken }}

  - name: main
    dependsOn:
      - spark-rbac
    timeout: 10m
    source:
      helmRepository:
        url: https://hub.jupyter.org/helm-chart/
        chart: jupyterhub
        version: 4.3.3
    values: |
      {{- $namespace := printf "%v" .Release.spec.targetNamespace -}}
      {{- $release := printf "%v" .Release.metadata.name -}}
      {{- $domain := printf "%v" .Context.platform.ingress.suffix -}}
      
      {{- $oidcId := .Context.jupyterHub.oidc.provider -}}
      {{- $oidcProvider := (index .Context $oidcId).provider -}}
      {{- $oidcRoleMapping := .Context.jupyterHub.oidc.roleMapping | default dict -}}
      
      {{- $oidcName := $oidcProvider.name -}}
      
      {{- $oidcAuthUrl := $oidcProvider.endpoints.authUrl
            | replace "{{ .Release.namespace }}"      $namespace
            | replace "{{ .Release.metadata.name }}"  $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $oidcTokenUrl := $oidcProvider.endpoints.tokenUrl
            | replace "{{ .Release.namespace }}"      $namespace
            | replace "{{ .Release.metadata.name }}"  $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $oidcUserInfoUrl := $oidcProvider.endpoints.userinfoUrl
            | replace "{{ .Release.namespace }}"      $namespace
            | replace "{{ .Release.metadata.name }}"  $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $storageId := .Context.jupyterHub.fileBrowser.provider -}}
      {{- $storageProvider := (index .Context $storageId).provider -}}
      
      {{- $storageApiUrl := $storageProvider.endpoints.apiUrl
          | replace "{{ .Release.namespace }}" $namespace
          | replace "{{ .Release.metadata.name }}" $release
          | replace "{{ .Context.ingress.suffix }}" $domain -}}
      
      {{- $jupyterUrl := .Context.jupyterHub.endpoints.url 
            | replace "{{ .Release.namespace }}"      $namespace
            | replace "{{ .Release.metadata.name }}"  $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $jupyterHost := regexReplaceAll "^https?://" $jupyterUrl "" -}}
      {{- $hiveMetastoreUrl := .Context.hiveMetastore.endpoints.url
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $welcomeNotebook := (.Context.jupyterHub.welcomeNotebook | default "") -}}
      {{- $welcomeNotebook = $welcomeNotebook
            | replace "{{ $jupyterUrl }}" $jupyterUrl
            | replace "{{ .Context.jupyterHub.endpoints.url }}" $jupyterUrl
            | replace "{{ .Release.namespace }}" $namespace
            | replace "{{ .Release.metadata.name }}" $release
            | replace "{{ .Context.ingress.suffix }}" $domain -}}
      {{- $jupyterConnections := (.Context.jupyterHub.connections | default list) -}}
      {{- if not (kindIs "slice" $jupyterConnections) }}
        {{- fail "context.jupyterHub.connections must be a list" -}}
      {{- end }}
      {{- $jupyterPySparkConnections := (.Context.jupyterHub.pyspark | default list) -}}
      {{- if not (kindIs "slice" $jupyterPySparkConnections) }}
        {{- fail "context.jupyterHub.pyspark must be a list" -}}
      {{- end }}
      {{- $sparkDefaults := (.Context.spark.defaults | default dict) -}}
      {{- if not (kindIs "map" $sparkDefaults) }}
        {{- fail "context.spark.defaults must be a map" -}}
      {{- end }}
      {{- $sparkDefaultKeys := (keys $sparkDefaults | sortAlpha) -}}
      {{- $jupyterConnectionsByName := dict -}}
      {{- range $connection := $jupyterConnections }}
        {{- if not (and $connection $connection.name) }}
          {{- fail "each item in context.jupyterHub.connections must define name" -}}
        {{- end }}
        {{- $_ := set $jupyterConnectionsByName $connection.name $connection -}}
      {{- end }}
      
      # Fix resource naming conflicts by using release name as prefix
      fullnameOverride: "{{ .Release.metadata.name }}"
      nameOverride: "{{ .Release.metadata.name }}"
      
      hub:
        extraEnv:
          OAUTH_CLIENT_ID:
            valueFrom:
              secretKeyRef:
                name: {{ .Context.jupyterHub.oidc.credentialsSecret.name }}
                key: {{ .Context.jupyterHub.oidc.credentialsSecret.clientIdKey }}
          OAUTH_CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: {{ .Context.jupyterHub.oidc.credentialsSecret.name }}
                key: {{ .Context.jupyterHub.oidc.credentialsSecret.clientSecretKey }}
          JUPYTERHUB_CRYPT_KEY:
            valueFrom:
              secretKeyRef:
                name: {{ .Context.jupyterHub.oidc.credentialsSecret.name }}
                key: {{ .Context.jupyterHub.oidc.credentialsSecret.jupyterHubCryptKey }}
        config:
          # https://oauthenticator.readthedocs.io/en/latest/how-to/refresh.html
          JupyterHub:
            authenticator_class: generic-oauth
            load_roles:
              - name: user
                scopes:
                  - self
                  - admin:auth_state!user
              - name: server
                scopes:
                  - users:activity!user
                  - access:servers!server
                  - admin:auth_state!user
          Authenticator:
            auto_login: true
            enable_auth_state: true
            auth_refresh_age: 300
            refresh_pre_spawn: true
          GenericOAuthenticator:
            login_service: {{ $oidcName }}
            oauth_callback_url: {{ $jupyterUrl }}/hub/oauth_callback
            authorize_url: {{ $oidcAuthUrl }}
            token_url: {{ $oidcTokenUrl }}
            userdata_url: {{ $oidcUserInfoUrl }}
            validate_server_cert: false
            claim_groups_key: groups
            manage_groups: true
            userdata_params:
              state: state
            {{- if gt (len $oidcRoleMapping) 0 }}
            {{- toYaml $oidcRoleMapping | nindent 6 }}
            {{- end }}
            username_key: preferred_username
            scope:
            - openid
            - profile
            - email
            - groups
        networkPolicy:
          enabled: false
        extraConfig:
          extraConfig01.py: |
            c.KubeSpawner.delete_grace_period = 120
            c.ServerApp.allow_root = True
        image:
          pullPolicy: Always
          pullSecrets: []
          name: quay.io/jupyterhub/k8s-hub
          tag: "4.3.3"
        db:
          type: sqlite-pvc
          pvc:
            storage: 1Gi
            storageClassName: "{{ .Context.platform.storageClass.workspace }}"
      
      rbac:
        create: true
      
      cull:
        enabled: false
      
      proxy:
        service:
          type: ClusterIP
      
      ingress:
        enabled: true
        annotations:
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          cert-manager.io/cluster-issuer: "{{ .Context.platform.certificateIssuers.selfSigned.name }}"
        ingressClassName: nginx
        hosts:
          - {{ $jupyterHost }}
        tls:
          - secretName: {{ .Release.metadata.name }}-tls
            hosts:
              - {{ $jupyterHost }}
      
      scheduling:
        userScheduler:
          enabled: false
        userPlaceholder:
          enabled: false
      
      singleuser:            
        # Fix user pod naming conflicts by prefixing with release name
        podNameTemplate: "{{ .Release.metadata.name }}-{username}{servername}"
        
        image:
          name: quay.io/okdp/jupyter/all-spark-notebook
          tag: "spark-3.5.6-python-3.11-java-17-scala-2.12"
        
        startTimeout: {{ .Parameters.startTimeout }}
      
        extraEnv:
          NB_USER: "$(JUPYTERHUB_USER)"
          NB_UID: "1001"
          NB_GID: "100"
          CHOWN_HOME: "yes"
          CHOWN_HOME_OPTS: "-R"
          JUPYTER_ENABLE_LAB: "yes"
          EDITOR: "vim"
          GIT_SSL_NO_VERIFY: "false"
          # Ignore InsecureRequestWarning warnings
          PYTHONWARNINGS: "ignore:Unverified HTTPS request"
          PYTHONPATH: "/etc/jupyter/auth"
          AWS_CA_BUNDLE: /cacerts/ca.crt
          REQUESTS_CA_BUNDLE: /cacerts/ca.crt
          CURL_CA_BUNDLE: /cacerts/ca.crt
          SSL_CERT_FILE: /cacerts/ca.crt
          TRUSTSTORE_PASSWORD: ""

          # https://github.com/jpmorganchase/jupyter-fs
          FS_S3_ENDPOINT_URL: "{{ $storageApiUrl }}"
          FS_S3_ACCESS_KEY:
            valueFrom:
              secretKeyRef:
                name: "{{ .Context.jupyterHub.fileBrowser.credentialsSecret.name }}"
                key: "{{ .Context.jupyterHub.fileBrowser.credentialsSecret.accessKeyKey }}"
          FS_S3_SECRET_KEY:
            valueFrom:
              secretKeyRef:
                name: "{{ .Context.jupyterHub.fileBrowser.credentialsSecret.name }}"
                key: "{{ .Context.jupyterHub.fileBrowser.credentialsSecret.secretKeyKey }}"

          {{- range $connectionName := $jupyterPySparkConnections }}
          {{- $connection := index $jupyterConnectionsByName $connectionName -}}
          {{- if $connection }}
          {{- $connectionEnvPrefix := upper (replace "." "_" (replace "-" "_" $connectionName)) -}}
          {{- $connectionStorageCredentialsSecret := (dig "storage" "credentialsSecret" nil $connection) -}}
          {{- if and $connectionStorageCredentialsSecret $connectionStorageCredentialsSecret.name $connectionStorageCredentialsSecret.accessKeyKey $connectionStorageCredentialsSecret.secretKeyKey }}
          {{ printf "%s_S3_ACCESS_KEY" $connectionEnvPrefix }}:
            valueFrom:
              secretKeyRef:
                name: "{{ $connectionStorageCredentialsSecret.name }}"
                key: "{{ $connectionStorageCredentialsSecret.accessKeyKey }}"
          {{ printf "%s_S3_SECRET_KEY" $connectionEnvPrefix }}:
            valueFrom:
              secretKeyRef:
                name: "{{ $connectionStorageCredentialsSecret.name }}"
                key: "{{ $connectionStorageCredentialsSecret.secretKeyKey }}"
          {{- end }}
          {{- end }}
          {{- end }}
      
          # Notebook pod IP used by Spark driver (spark.driver.host) in client mode
          POD_IP:
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
      
          {{- if .Context.platform.proxy.httpProxy }}
          HTTP_PROXY: {{ .Context.platform.proxy.httpProxy | quote }}
          {{- end }}
          {{- if .Context.platform.proxy.httpsProxy }}
          HTTPS_PROXY: {{ .Context.platform.proxy.httpsProxy | quote }}
          {{- end }}
          {{- if .Context.platform.proxy.noProxy }}
          NO_PROXY: {{ .Context.platform.proxy.noProxy | quote }}
          {{- end }}
      
        {{- if $welcomeNotebook }}
        lifecycleHooks:
          postStart:
            exec:
              command:
                - /bin/bash
                - -lc
                - |
                  set -e
                  HOME="/home/$JUPYTERHUB_USER"
                  if [ ! -f "$HOME/Welcome.ipynb" ]; then
                    cp /etc/jupyterhub/welcome/Welcome.ipynb "$HOME/Welcome.ipynb"
                  fi
       
        defaultUrl: "/lab/tree/Welcome.ipynb"
        {{- end }}
      
        extraFiles:
          {{- if and $welcomeNotebook }}
          welcome-notebook:
            mountPath: /etc/jupyterhub/welcome/Welcome.ipynb
            stringData: |
              {{- $welcomeNotebook | trim | nindent 14 }}
          {{- end }}
      
          jupyter_server_config_py:
            mountPath: /etc/jupyter/jupyter_server_config.py
            stringData: |      
              c.ServerApp.contents_manager_class = "jupyterfs.MetaManager"
              c.ServerApp.jpserver_extensions = {"jupyterfs.extension": True}
              
              {{- $root := . }}
              {{- $fileBrowserLocations := list }}
              {{- $locations := dig "jupyterHub" "fileBrowser" "locations" (list) $root.Context }}
              
              {{- range $location := $locations }}
              {{- $name := default "" $location.name }}
              {{- $uri := default "" $location.uri }}
              {{- if and $name $uri }}
              {{- $fileBrowserLocations = append $fileBrowserLocations (dict "name" $name "uri" $uri) }}
              {{- end }}
              {{- end }}
              
              file_browser_locations = {{ $fileBrowserLocations | toJson }}
              
              import os
              
              c.JupyterFs.resources = [{
                "name": loc["name"],
                "url": loc["uri"],
                "type": "fsspec",
                "defaultWritable": True,
                "use_listings_cache": False,
                "auth": "none",
                "kwargs": {
                  "key": os.environ["FS_S3_ACCESS_KEY"],
                  "secret": os.environ["FS_S3_SECRET_KEY"],
                  "client_kwargs": {
                    "endpoint_url": os.environ["FS_S3_ENDPOINT_URL"],
                    "verify": os.environ["AWS_CA_BUNDLE"],
                  },
                },
               }
               for loc in file_browser_locations
              ]
      
          notebook_oauth2:
            mountPath: /etc/jupyter/auth/sitecustomize.py
            stringData: |
              import builtins
              import os
              import requests
            
              def _fresh_access_token():
                hub_token = os.environ["JUPYTERHUB_API_TOKEN"]
                hub_api_url = os.environ["JUPYTERHUB_API_URL"]
                user = os.environ["JUPYTERHUB_USER"]
                
                r = requests.get(
                  f"{hub_api_url}/users/{user}",
                  headers={"Authorization": f"Bearer {hub_token}"},
                  timeout=10,
                )
                r.raise_for_status()
                
                data = r.json()
                auth_state = data.get("auth_state")
                if auth_state is None:
                  raise RuntimeError(f"auth_state is null for user {user}")
                token = auth_state.get("access_token")
                if not token:
                  raise RuntimeError(f"No access_token in auth_state. Keys: {list(auth_state.keys())}")
                return token
              
              def _current_user():
                user = os.environ.get("JUPYTERHUB_USER")
                if not user:
                  raise RuntimeError("JUPYTERHUB_USER is not set")
                return user
  
              builtins.access_token = _fresh_access_token
              builtins.me = _current_user
      
        cpu:
          limit: {{ mulf (float64 .Parameters.cpu) 2 }}
          guarantee: {{ .Parameters.cpu }}
        memory:
          limit: {{ mulf (float64 .Parameters.memoryGi) 2 }}G
          guarantee: {{ .Parameters.memoryGi }}G
      
        profileList:
          - display_name: "🪶 Minimal Python1"
            description: "Lightweight image with only Python 3.12"
            kubespawner_override:
              image: quay.io/okdp/jupyter/minimal-notebook:python-3.12.12-hub-5.4.2-lab-4.5.0
              image_pull_policy: Always
          - display_name: "📊 Scientific Python"
            description: "Includes Git, Pandas, NumPy, S3 browser, and Trino SQL support."
            kubespawner_override:
              image: quay.io/okdp/jupyter/scipy-notebook:python-3.12.12-hub-5.4.2-lab-4.5.0
              image_pull_policy: Always
          - display_name: "📊 Data Science"
            description: "Includes Git, Pandas, NumPy, S3 browser, and Trino SQL support, Matplotlib, R, and Julia"
            kubespawner_override:
              image: quay.io/okdp/jupyter/datascience-notebook:python-3.12.12-hub-5.4.2-lab-4.5.0
              image_pull_policy: Always
          - display_name: "🔥 PySpark"
            description: "Apache Spark big data processing"
            default: true
            kubespawner_override:
              image_pull_policy: Always
              environment:
                ######### TODO #####
                # 1- Some confs to be externalized into spark-defaults package
                PYSPARK_SUBMIT_ARGS: >-
                  --master k8s://https://kubernetes.default.svc.cluster.local
                  --conf spark.submit.deployMode=client
                  --conf spark.driver.host=$(POD_IP)
                  --conf spark.kubernetes.driverEnv.SPARK_USER=$(NB_USER)
                  --conf spark.executorEnv.SPARK_USER=$(NB_USER)
                  --conf spark.kubernetes.container.image=$(SPARK_EXECUTOR_IMAGE)
                  --conf spark.kubernetes.executor.secrets.certs-bundle=/cacerts
                  --conf "spark.driver.extraJavaOptions=-Djavax.net.ssl.trustStore=/cacerts/bundle.p12 -Djavax.net.ssl.trustStoreType=PKCS12 -Djavax.net.ssl.trustStorePassword="
                  --conf "spark.executor.extraJavaOptions=-Djavax.net.ssl.trustStore=/cacerts/bundle.p12 -Djavax.net.ssl.trustStoreType=PKCS12 -Djavax.net.ssl.trustStorePassword="
                  --conf spark.kubernetes.namespace={{ $namespace }}
                  {{ range $key := $sparkDefaultKeys }}
                  --conf {{ printf "%s=%s" $key ((printf "%v" (index $sparkDefaults $key))
                    | replace "{{ hiveMetastore.endpoint.url }}" $hiveMetastoreUrl
                    | replace "{{ hiveMetastore.endpoints.url }}" $hiveMetastoreUrl
                    | replace "{{ .Release.namespace }}" $namespace
                    | replace "{{ .Release.metadata.name }}" $release
                    | replace "{{ .Context.ingress.suffix }}" $domain
                    | replace "NAMESPACE" $namespace) | quote }}
                  {{- end }}
                  --conf spark.kubernetes.authenticate.serviceAccountName={{ .Context.spark.rbac.serviceAccount.name }}
                  {{- range $connectionName := $jupyterPySparkConnections }}
                  {{- $connection := index $jupyterConnectionsByName $connectionName -}}
                  {{- if $connection }}
                  {{- $connectionEnvPrefix := upper (replace "." "_" (replace "-" "_" $connectionName)) -}}
                  {{- $connectionProperties := ($connection.properties | default "") -}}
                  {{- $connectionServiceId := dig "service" "name" "" $connection -}}
                  {{- $connectionOidc := (dig "service" "oidc" nil $connection | default $connection.oidc | default (dig "auth" "oidc" nil $connection)) -}}
                  {{- $connectionOidcTokenUrl := $oidcTokenUrl -}}
                  {{- $connectionStorage := (dig "storage" nil $connection | default dict) -}}
                  {{- $connectionStorageProviderId := (dig "provider" "" $connectionStorage) -}}
                  {{- $connectionStorageCredentialsSecret := (dig "credentialsSecret" nil $connectionStorage) -}}
                  {{- $connectionProperties = $connectionProperties
                        | replace "{{ connection.name }}" $connectionName -}}
                  {{- if $connectionServiceId }}
                    {{- $connectionService := index $.Context $connectionServiceId -}}
                    {{- $connectionServiceUrl := $connectionService.endpoints.url
                          | replace "{{ .Release.namespace }}" $namespace
                          | replace "{{ .Release.metadata.name }}" $release
                          | replace "{{ .Context.ingress.suffix }}" $domain -}}
                    {{- $connectionProperties = $connectionProperties
                          | replace "{{ service.endpoint.url }}" $connectionServiceUrl
                          | replace "{{ service.endpoints.url }}" $connectionServiceUrl -}}
                  {{- end }}
                  {{- if $connectionStorageProviderId }}
                    {{- $connectionStorageProvider := (index $.Context $connectionStorageProviderId).provider -}}
                    {{- $connectionStorageApiUrl := $connectionStorageProvider.endpoints.apiUrl
                          | replace "{{ .Release.namespace }}" $namespace
                          | replace "{{ .Release.metadata.name }}" $release
                          | replace "{{ .Context.ingress.suffix }}" $domain -}}
                    {{- $connectionStorageRegion := printf "%v" $connectionStorageProvider.region -}}
                    {{- $connectionProperties = $connectionProperties
                          | replace "{{ storage.endpoints.api }}" $connectionStorageApiUrl
                          | replace "{{ storage.endpoints.apiUrl }}" $connectionStorageApiUrl
                          | replace "{{ storage.region }}" $connectionStorageRegion -}}
                  {{- end }}
                  {{- if and $connectionStorageCredentialsSecret $connectionStorageCredentialsSecret.name $connectionStorageCredentialsSecret.accessKeyKey $connectionStorageCredentialsSecret.secretKeyKey }}
                    {{- $connectionProperties = $connectionProperties
                          | replace "$(S3_ACCESS_KEY)" (printf "$(%s_S3_ACCESS_KEY)" $connectionEnvPrefix)
                          | replace "$(S3_SECRET_KEY)" (printf "$(%s_S3_SECRET_KEY)" $connectionEnvPrefix) -}}
                  {{- end }}
                  {{- if and $connectionOidc $connectionOidc.provider }}
                    {{- $connectionOidcProviderId := $connectionOidc.provider -}}
                    {{- $connectionOidcProvider := (index $.Context $connectionOidcProviderId).provider -}}
                    {{- $connectionOidcTokenUrl = $connectionOidcProvider.endpoints.tokenUrl
                          | replace "{{ .Release.namespace }}" $namespace
                          | replace "{{ .Release.metadata.name }}" $release
                          | replace "{{ .Context.ingress.suffix }}" $domain -}}
                  {{- end }}
                  {{- $connectionProperties = $connectionProperties
                        | replace "{{ idp.endpoints.token }}" $connectionOidcTokenUrl
                        | replace "{{ idp.endpoints.tokenUrl }}" $connectionOidcTokenUrl -}}
                  {{- if $connectionProperties }}
                  {{- range $line := splitList "\n" $connectionProperties }}
                  {{- $line = trim $line -}}
                  {{- if $line }}
                  --conf {{ $line | quote }}
                  {{- end }}
                  {{- end }}
                  {{- end }}
                  {{- end }}
                  {{- end }}
                  pyspark-shell
            profile_options:
              image:
                display_name: "Select PySpark kernel version"
                choices:
                  spark344:
                    display_name: "PySpark 3.4.4 / Python 3.11"
                    kubespawner_override:
                      image: quay.io/okdp/jupyter/all-spark-notebook:spark-3.4.4-python-3.11-java-17-scala-2.12
                      image_pull_policy: Always
                      environment:
                        SPARK_EXECUTOR_IMAGE: quay.io/okdp/spark-py:spark-3.4.4-python-3.11-scala-2.12-java-17
                  spark356:
                    display_name: "PySpark 3.5.6 / Python 3.11"
                    default: true
                    kubespawner_override:
                      image: quay.io/okdp/jupyter/all-spark-notebook:spark-3.5.6-python-3.11-java-17-scala-2.12
                      image_pull_policy: Always
                      environment:
                        SPARK_EXECUTOR_IMAGE: quay.io/okdp/spark-py:spark-3.5.6-python-3.11-scala-2.12-java-17
        
        serviceAccountName: {{ .Context.spark.rbac.serviceAccount.name }}
        storage:
          homeMountPath: "/home/{username}"
          dynamic:
            storageClass: standard
            # Fix PVC naming conflicts by prefixing with release name
            pvcNameTemplate: "{{ .Release.metadata.name }}-claim-{username}{servername}"
            volumeNameTemplate: "{{ .Release.metadata.name }}-volume-{username}{servername}"
          type: dynamic
          extraVolumes:
            - name: cacerts
              secret:
                secretName: certs-bundle
          extraVolumeMounts:
            - name: cacerts
              mountPath: /cacerts
              readOnly: true
        cloudMetadata:
          blockWithIptables: false
        uid: 0
        fsGid: 100
        extraPodConfig:
          automount_service_account_token: true
          terminationGracePeriodSeconds: 120
        networkPolicy:
          enabled: false
      prePuller:
        hook:
          enabled: false
        continuous:
          enabled: false

roles:
  - notebooks
